<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0e14;--surface:#111722;--surface2:#1a2233;--border:#1f2d47;--accent:#00d4ff;--accent2:#ff6b35;--green:#00ff9f;--red:#ff4757;--yellow:#ffd32a;--text:#c8d8f0;--dim:#5a7aa0;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.badges{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.badge{font-family:var(--mono);font-size:9px;letter-spacing:.1em;padding:3px 7px;border:1px solid}
.badge-blue{color:var(--accent);border-color:var(--accent)}.badge-yellow{color:var(--yellow);border-color:var(--yellow)}.badge-red{color:var(--red);border-color:var(--red)}
.hdr-title{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--dim)}
.prog-wrap{display:flex;align-items:center;gap:8px}
.prog-label{font-family:var(--mono);font-size:11px;color:var(--dim);white-space:nowrap}
.prog-outer{width:80px;height:3px;background:var(--border)}.prog-inner{height:100%;background:var(--accent);box-shadow:0 0 6px var(--accent);transition:width .4s}
.main{max-width:700px;margin:0 auto;padding:28px 16px 80px}
.sec-num{font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:.12em;margin-bottom:6px}
.sec-title{font-size:22px;font-weight:700;color:#fff;margin-bottom:8px;line-height:1.2}
.sec-desc{font-size:13px;color:var(--dim);line-height:1.6;margin-bottom:24px}
.card{background:var(--surface);border:1px solid var(--border);padding:20px 20px 20px 24px;margin-bottom:14px;position:relative}
.card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--accent)}
.card.warn::before{background:var(--yellow)}.card.danger::before{background:var(--red)}.card.ok::before{background:var(--green)}
.card-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
.card.warn .card-lbl{color:var(--yellow)}.card.danger .card-lbl{color:var(--red)}.card.ok .card-lbl{color:var(--green)}
.card h3{font-size:14px;font-weight:600;color:#fff;margin-bottom:8px}
.card p,.card li{font-size:13px;color:var(--text);line-height:1.65}
.card ul{list-style:none;padding:0}.card ul li{padding:4px 0 4px 14px;position:relative}
.card ul li::before{content:'>';position:absolute;left:0;color:var(--accent);font-weight:700}
table{width:100%;border-collapse:collapse;font-size:12px;margin-top:4px}
th{text-align:left;font-family:var(--mono);font-size:9px;letter-spacing:.08em;color:var(--dim);padding:6px 10px;border-bottom:1px solid var(--border);text-transform:uppercase}
td{padding:8px 10px;border-bottom:1px solid rgba(31,45,71,.5);color:var(--text);vertical-align:top;font-size:12px}
tr:last-child td{border:none}
.tag{display:inline-block;font-family:var(--mono);font-size:9px;padding:2px 5px;letter-spacing:.04em}
.t-blue{background:rgba(0,212,255,.1);color:var(--accent);border:1px solid rgba(0,212,255,.3)}
.t-red{background:rgba(255,71,87,.1);color:var(--red);border:1px solid rgba(255,71,87,.3)}
.t-yel{background:rgba(255,211,42,.1);color:var(--yellow);border:1px solid rgba(255,211,42,.3)}
.quiz-box{background:var(--surface);border:1px solid var(--border);padding:24px 20px;position:relative}
.quiz-box::before{content:'';position:absolute;top:0;left:0;width:100%;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.q-counter{font-family:var(--mono);font-size:10px;color:var(--dim);margin-bottom:12px}
.q-text{font-size:15px;font-weight:600;color:#fff;line-height:1.5;margin-bottom:20px}
.options{display:flex;flex-direction:column;gap:8px}
.opt{background:var(--surface2);border:1px solid var(--border);padding:12px 14px;cursor:pointer;display:flex;gap:10px;align-items:flex-start;font-size:13px;color:var(--text);text-align:left;width:100%;transition:border-color .15s}
.opt:hover{border-color:var(--accent);color:#fff}
.opt.correct{border-color:var(--green);background:rgba(0,255,159,.05);color:var(--green)}
.opt.wrong{border-color:var(--red);background:rgba(255,71,87,.05);color:var(--red)}
.opt.off{cursor:default;pointer-events:none}
.opt-letter{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--accent);min-width:16px;padding-top:1px}
.opt.correct .opt-letter{color:var(--green)}.opt.wrong .opt-letter{color:var(--red)}
.feedback{margin-top:16px;padding:13px 14px;border-left:3px solid var(--green);font-size:13px;color:var(--text);line-height:1.6;display:none}
.feedback.show{display:block}.feedback.bad{border-color:var(--red)}
.feedback strong{color:#fff}
.nav{display:flex;align-items:center;justify-content:space-between;margin-top:28px}
.dots{display:flex;gap:5px;flex-wrap:wrap}
.dot{width:6px;height:6px;border-radius:50%;background:var(--border)}.dot.active{background:var(--accent);box-shadow:0 0 5px var(--accent)}.dot.done{background:var(--green)}
.btn{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:10px 20px;border:1px solid;cursor:pointer;background:transparent;transition:all .15s}
.btn-p{border-color:var(--accent);color:var(--accent)}.btn-p:hover{background:var(--accent);color:var(--bg)}.btn-p:disabled{opacity:.3;cursor:default;pointer-events:none}
.btn-g{border-color:var(--border);color:var(--dim)}.btn-g:hover{border-color:var(--dim);color:var(--text)}
.done-wrap{text-align:center;padding:48px 0}.done-icon{font-size:44px;margin-bottom:16px}
.done-wrap h2{font-size:24px;font-weight:700;color:#fff;margin-bottom:8px}
.done-wrap p{font-size:13px;color:var(--dim);max-width:460px;margin:0 auto 24px;line-height:1.6}
.score{font-family:var(--mono);font-size:44px;font-weight:600;text-shadow:0 0 24px rgba(0,255,159,.4);margin:16px 0 4px}
.score.pass{color:var(--green)}.score.fail{color:var(--red)}
.cert{border:1px solid var(--border);background:var(--surface);padding:20px 24px;display:inline-block;text-align:left;margin-top:20px;max-width:440px;width:100%}
.cert-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:var(--accent);margin-bottom:12px;text-transform:uppercase}
.cert-row{font-family:var(--mono);font-size:11px;color:var(--dim);margin-bottom:4px}.cert-row span{color:var(--text)}
.reg-box{background:var(--surface);border:1px solid var(--border);padding:32px 28px;max-width:420px;margin:0 auto}
.reg-box label{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--dim);text-transform:uppercase;margin-bottom:6px}
.reg-box input{width:100%;background:var(--surface2);border:1px solid var(--border);color:#fff;font-family:var(--sans);font-size:14px;padding:10px 12px;margin-bottom:20px;outline:none;transition:border-color .15s}
.reg-box input:focus{border-color:var(--accent)}.reg-box input[readonly]{color:var(--dim);cursor:default}
</style>
</head>

<script>
var FORM_URL='https://docs.google.com/forms/d/e/1FAIpQLSdHsEWs-iPTGncIBdIiFGaEnxl6MXMN6IHFnUVDGyG1Trf4fw/viewform';
var FIELD_NAME='entry.1084561241',FIELD_DATE='entry.989191631',FIELD_COURSE='entry.1455054579',FIELD_SCORE='entry.766034301',FIELD_HASH='entry.1157983501';

var steps=[{type:'reg'},{type:'c',id:'overview'},{type:'c',id:'framework'},{type:'c',id:'bia'},{type:'c',id:'backup'},{type:'c',id:'ops'},{type:'q',id:0},{type:'q',id:1},{type:'q',id:2},{type:'q',id:3},{type:'q',id:4},{type:'done'}];
var qs=[
{q:'According to NIST SP 800-34 Rev. 1, which of the following BEST describes the purpose of a Business Impact Analysis (BIA)?',
opts:['To document the technical architecture of all IT systems for asset inventory purposes','To identify critical IT resources, quantify the impact of their disruption, and establish RTOs and RPOs that drive recovery priorities','To assign blame and accountability when systems fail during a disaster event','To select which alternate processing site type (hot, warm, or cold) the organization should use'],ans:1,
fb:'<strong>Correct.</strong> The BIA is the analytical foundation of all contingency planning. It identifies which systems are critical to mission operations, quantifies downtime impacts at defined intervals, and establishes the RTOs and RPOs that govern backup frequency and recovery sequencing.'},
{q:'A backup administrator learns that the finance system has a Recovery Point Objective (RPO) of 4 hours. What does this mean for the backup schedule?',
opts:['The finance system must be fully restored within 4 hours after a disaster is declared','Finance system backups must be retained for a minimum of 4 hours before they can be deleted','Backups must run at least every 4 hours -- ensuring no more than 4 hours of data is ever at risk of loss','The finance team must be notified within 4 hours if any backup job fails'],ans:2,
fb:'<strong>Correct.</strong> RPO defines the maximum acceptable data loss measured in time. An RPO of 4 hours means backups must run at least every 4 hours to keep actual data loss within that window.'},
{q:'During a disaster recovery event, the Recovery Team Lead wants to restore all systems simultaneously to speed up recovery. What does NIST SP 800-34 recommend instead?',
opts:['Systems should be restored simultaneously to minimize overall downtime -- parallel recovery is always preferred','Systems should be restored in priority sequence -- Tier 1 (mission critical) first, then Tier 2, then Tier 3 -- based on BIA-established recovery priorities','The order of recovery should be determined on the fly by the IT team based on technical difficulty','All systems must be rebuilt from scratch before any can be brought online -- partial recovery is not permitted'],ans:1,
fb:'<strong>Correct.</strong> NIST SP 800-34 requires recovery to follow the priority sequence established by the BIA. Tier 1 mission-critical systems are recovered first, ensuring the most important functions are restored with limited resources during a disaster.'},
{q:'An organization\'s primary data center is destroyed by a fire. They need to resume Tier 1 operations within 2 hours. Which alternate site type is REQUIRED to meet this objective?',
opts:['Cold site -- basic infrastructure with no pre-installed equipment; lowest cost option','Warm site -- partially equipped facility requiring data restoration, with setup time measured in hours to a day','Hot site -- fully equipped facility with hardware and near-real-time data replication; can assume operations within hours','Reciprocal agreement -- mutual use arrangement with a similar organization at no capital cost'],ans:2,
fb:'<strong>Correct.</strong> A 2-hour RTO can only be achieved with a hot site. Hot sites maintain fully replicated infrastructure and data, enabling near-immediate failover. Cold sites require days to weeks. Warm sites require hours to days.'},
{q:'NIST SP 800-34 Rev. 1 and FISMA require contingency plan testing at minimum how frequently, and what is the LEAST rigorous testing method that still satisfies this requirement?',
opts:['Every 3 years; a full-scale functional exercise with complete alternate site failover','Every 6 months; a functional exercise with partial system restoration','Annually; a checklist review or tabletop exercise at minimum satisfies the annual testing requirement','There is no federal testing requirement -- testing frequency is at the organization\'s discretion'],ans:2,
fb:'<strong>Correct.</strong> NIST SP 800-34 and FISMA require annual contingency plan testing. The minimum acceptable method is a checklist review or tabletop exercise. More rigorous testing is recommended for critical systems but the annual baseline can be met with a tabletop exercise.'}
];
function dots(){var v=steps.filter(function(s){return s.type!=='done'&&s.type!=='reg'});return v.map(function(s,i){var idx=steps.indexOf(s);var c='dot';if(idx<step)c+=' done';else if(idx===step)c+=' active';return '<div class="'+c+'"></div>'}).join('')}
function nextStep(){if(step<steps.length-1){step++;render();window.scrollTo(0,0)}}
function updateProg(){var t=steps.filter(function(s){return s.type!=='done'&&s.type!=='reg'}).length;var c=Math.max(0,step-1);document.getElementById('pbar').style.width=Math.round(c/t*100)+'%';document.getElementById('plbl').textContent=c+'/'+t}
function answerQ(qi,ch){if(answers[qi]!==undefined)return;answers[qi]=ch;if(ch===qs[qi].ans)correct++;render()}
function card(t,l,h,b){var cls='card'+(t==='warn'?' warn':t==='danger'?' danger':t==='ok'?' ok':'');var bd=typeof b==='string'?'<p>'+b+'</p>':'<ul>'+b.map(function(i){return '<li>'+i+'</li>'}).join('')+'</ul>';return '<div class="'+cls+'"><div class="card-lbl">'+l+'</div><h3>'+h+'</h3>'+bd+'</div>'}
function renderReg(){var now=new Date();var ds=now.toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});return '<div class="sec-num">REGISTRATION</div><div class="sec-title">Business Contingency / Disaster Recovery Training (CP-3)</div><div class="sec-desc">NIST SP 800-34 Rev. 1 Aligned | Estimated Duration: 30 Minutes | 80% passing score required</div><div class="reg-box"><label>Full Name</label><input type="text" id="regName" placeholder="e.g. Jane Doe" value="'+userName+'" autocomplete="name"/><label>Date</label><input type="text" value="'+ds+'" readonly/><button class="btn btn-p" style="width:100%" onclick="startTraining()">Begin Training --></button></div>'}
function startTraining(){var n=document.getElementById('regName').value.trim();if(!n){document.getElementById('regName').style.borderColor='var(--red)';return}userName=n;nextStep()}
function renderContent(id){var h='';
if(id==='overview'){
h+='<div class="sec-num">01 -- OVERVIEW</div><div class="sec-title">What Is Contingency Planning?</div><div class="sec-desc">IT contingency planning is the development and implementation of plans, procedures, and technical measures to recover IT systems, operations, and data after a disruption.</div>';
h+=card('','Who This Training Is For','Mandatory Personnel',['Backup Administrators -- manage and validate backup systems, schedules, and media','DR Team Personnel -- coordinate and execute disaster recovery plan activation','Contingency Planners -- develop, maintain, and test BCP, COOP, and DRP','IT Operations Staff -- support recovery operations by executing documented procedures']);
h+=card('warn','Three Types of Disruption','Know the Scale',['<strong>Non-Disaster:</strong> Power outage, hardware failure, software bug. Handled through normal IT support without full DR activation','<strong>Disaster:</strong> Major fire, severe weather, significant cyberattack. Requires formal plan activation, possible alternate site','<strong>Catastrophe:</strong> Complete facility destruction, regional infrastructure failure. Full COOP activation; recovery may span weeks to months']);
h+=card('danger','Why This Matters','The Cost of Being Unprepared',['FISMA requires federal agencies to develop, document, and implement contingency plans for all information systems','Average cost of IT downtime: $5,600 per minute for large enterprises (Gartner)','Organizations without DR plans take 3x longer to recover from major outages','NIST SP 800-53 CP family controls mandate backup, recovery, and continuity capabilities']);
}else if(id==='framework'){
h+='<div class="sec-num">02 -- NIST SP 800-34 FRAMEWORK</div><div class="sec-title">The 7-Step Process &amp; Key Plans</div><div class="sec-desc">NIST SP 800-34 defines a structured seven-step process for developing and maintaining IT contingency plans.</div>';
h+=card('','7-Step Process','NIST SP 800-34 Rev. 1',['<strong>Step 1:</strong> Develop contingency planning policy -- scope, roles, resources, testing schedules','<strong>Step 2:</strong> Conduct Business Impact Analysis (BIA) -- identify critical resources, set RTOs/RPOs','<strong>Step 3:</strong> Identify preventive controls -- UPS, redundant systems, fire suppression','<strong>Step 4:</strong> Create contingency strategies -- backup sites, redundant comms, data backup methods','<strong>Step 5:</strong> Develop the contingency plan -- activation criteria, notifications, recovery procedures','<strong>Step 6:</strong> Ensure plan training -- train all personnel with contingency roles annually','<strong>Step 7:</strong> Exercise, test & maintain the plan -- tabletop exercises, functional tests, annual updates']);
h+=card('warn','BCP','Business Continuity Plan',['Scope: Business operations -- ensuring critical business functions continue during and after disruption','Identifies critical business processes and their IT dependencies','Documents manual workarounds when systems are unavailable','Defines essential personnel and minimum service level requirements during recovery']);
h+=card('danger','COOP','Continuity of Operations Plan',['Scope: Mission & government functions from an alternate location for up to 30 days','Identifies essential functions and order of succession','Establishes alternate facilities and operating locations','Addresses delegation of authority, devolution, and vital records protection']);
h+=card('ok','DRP','Disaster Recovery Plan',['Scope: IT systems & infrastructure -- technical procedures for recovery after a major disruption','Defines recovery priorities by system criticality tier','Documents step-by-step recovery procedures per system','Specifies alternate processing sites and failover procedures']);
}else if(id==='bia'){
h+='<div class="sec-num">03 -- BIA, RTO, RPO &amp; RECOVERY TIERS</div><div class="sec-title">Business Impact Analysis &amp; Recovery Objectives</div><div class="sec-desc">The BIA is the foundation of all contingency planning. It identifies which systems are most critical and quantifies the impact of their loss.</div>';
h+=card('','BIA Purpose','What the BIA Determines',['<strong>Critical Functions:</strong> Which business processes and IT systems are essential to mission success','<strong>Interdependencies:</strong> Which systems depend on each other -- losing System A may make System B unavailable','<strong>Impact Quantification:</strong> Financial, operational, legal, and reputational costs at defined intervals (1h, 4h, 24h, 7d)','<strong>Recovery Priorities:</strong> Systems ranked Tier 1 (mission critical) through Tier 3 (non-critical)']);
h+=card('warn','Key Metrics','MTD, RTO &amp; RPO',['<strong>MTD (Maximum Tolerable Downtime):</strong> Total time a process can be unavailable before unacceptable consequences occur','<strong>RTO (Recovery Time Objective):</strong> Maximum acceptable time to restore a system after disruption. Must be &le; MTD','<strong>RPO (Recovery Point Objective):</strong> Maximum acceptable data loss measured in time. Determines backup frequency']);
h+='<div class="card" style="padding:0;overflow:auto"><table><thead><tr><th>Tier</th><th>Priority</th><th>Examples</th><th>RTO</th><th>RPO</th></tr></thead><tbody>';
h+='<tr><td><span class="tag t-red">1</span></td><td style="color:#fff;font-weight:600">Mission Critical</td><td>Core financial, identity mgmt, comms</td><td>0-4 hours</td><td>0-1 hour</td></tr>';
h+='<tr><td><span class="tag t-yel">2</span></td><td style="color:#fff;font-weight:600">Essential</td><td>Email, HR, document mgmt</td><td>4-24 hours</td><td>4 hours</td></tr>';
h+='<tr><td><span class="tag t-blue">3</span></td><td style="color:#fff;font-weight:600">Non-Critical</td><td>Reporting tools, training systems</td><td>24-72 hours</td><td>24 hours</td></tr>';
h+='</tbody></table></div>';
}else if(id==='backup'){
h+='<div class="sec-num">04 -- BACKUPS &amp; ALTERNATE SITES</div><div class="sec-title">Backup Strategies &amp; Recovery Facilities</div><div class="sec-desc">The 3-2-1 Backup Rule: 3 copies of data, on 2 different media types, with 1 copy stored off-site. Backups not tested are not backups.</div>';
h+=card('','Backup Types','Know Your Options',['<strong>Full Backup:</strong> Complete copy of all data. Longest to create, fastest to restore. Run weekly minimum for Tier 1','<strong>Incremental:</strong> Only data changed since last backup. Fastest to run but requires all incrementals + last full for restore','<strong>Differential:</strong> All data changed since last FULL backup. Restore requires only last full + last differential','<strong>Continuous/Snapshot:</strong> Near-real-time replication or point-in-time snapshots. Required for Tier 1 with RPO < 1 hour']);
h+=card('warn','Backup Admin Requirements','Your Responsibilities',['Validate backup completion daily -- failed backups must trigger an alert and be rescheduled immediately','Test backup restoration monthly for Tier 1 systems, quarterly for Tier 2 -- document results','Encrypt all backup media at rest and in transit -- treat backup media as sensitive data','Store off-site backups at sufficient geographic distance (100+ miles recommended)','Include cloud-based backups in scope -- test cloud restoration procedures']);
h+=card('danger','Alternate Sites','Hot / Warm / Cold',['<strong>Hot Site:</strong> Fully equipped, near-real-time replication. RTO: 0-4 hours. Highest cost. Best for Tier 1.','<strong>Warm Site:</strong> Partially equipped, requires data restoration. RTO: 4-24 hours. Best for Tier 1-2 with RTO > 4h.','<strong>Cold Site:</strong> Basic infrastructure only, no equipment. RTO: Days to weeks. Lowest cost. Tier 3 only.','<strong>Cloud DR:</strong> On-demand infrastructure eliminates capital cost; can act as hot or warm site depending on replication strategy']);
}else if(id==='ops'){
h+='<div class="sec-num">05 -- DR OPERATIONS &amp; TESTING</div><div class="sec-title">Roles, Activation &amp; Plan Maintenance</div><div class="sec-desc">Every person with a contingency role must know their responsibilities before an event occurs. An untested plan is not a plan -- it is a hypothesis.</div>';
h+=card('','DR Team Roles','Know Your Assignment',['<strong>Contingency Plan Coordinator (CPC):</strong> Overall CP responsibility; leads BIA updates; declares disaster activation','<strong>Recovery Team Lead:</strong> Manages technical recovery execution; tracks milestones; makes real-time sequencing decisions','<strong>Backup Administrator:</strong> Maintains backup systems daily; executes data restoration during DR; tests integrity monthly','<strong>IT Infrastructure Lead:</strong> Network, server, and storage recovery; coordinates alternate site activation','<strong>Applications Lead:</strong> Restoration and validation of critical business applications','<strong>Communications Lead:</strong> Manages stakeholder notifications; coordinates with external vendors']);
h+=card('warn','Activation Triggers','When to Activate the Plan',['Primary site is inaccessible or unsafe for personnel','System outage exceeds or is projected to exceed the Maximum Tolerable Downtime (MTD)','Ransomware, destructive cyberattack, or data corruption affects critical systems','Significant natural disaster affecting operations','Loss of critical infrastructure: prolonged power failure, network outage','Decision by authorized CPC or executive leadership']);
h+=card('ok','Testing Requirements','Annual at Minimum',['<strong>Checklist Review:</strong> Team reviews plan for accuracy. Low effort. Minimum annual requirement.','<strong>Tabletop Exercise:</strong> Team walks through a simulated scenario. Identifies gaps in roles and procedures.','<strong>Walk-Through Drill:</strong> Personnel physically walk through recovery duties without activating systems.','<strong>Functional Exercise:</strong> Partial activation of recovery procedures. May include backup restoration tests.','<strong>Full-Scale Test:</strong> Complete DRP activation including failover to alternate site. Highest fidelity.','Plans must be reviewed annually and updated after significant changes, incidents, or exercises']);
}
h+='<div class="nav"><div class="dots">'+dots()+'</div><button class="btn btn-p" onclick="nextStep()">'+(id==='ops'?'Start Quiz -->':'Continue -->')+'</button></div>';return h}
function renderQuiz(qi){var q=qs[qi];var a=answers[qi]!==undefined;var h='<div class="sec-num">KNOWLEDGE CHECK</div><div class="sec-title">Quiz</div><div class="quiz-box"><div class="q-counter">QUESTION '+(qi+1)+' / '+qs.length+'</div><div class="q-text">'+q.q+'</div><div class="options">';
var L=['A','B','C','D'];q.opts.forEach(function(o,i){var c='opt';if(a){c+=' off';if(i===q.ans)c+=' correct';else if(i===answers[qi])c+=' wrong'}h+='<button class="'+c+'" onclick="answerQ('+qi+','+i+')"><span class="opt-letter">'+L[i]+'</span><span>'+o+'</span></button>'});
h+='</div>';var ok=a&&answers[qi]===q.ans;h+='<div class="feedback'+(a?' show':'')+(a&&!ok?' bad':'')+'">'+(a?(ok?'+ ':'x ')+q.fb:'')+'</div></div>';
h+='<div class="nav"><div class="dots">'+dots()+'</div><button class="btn btn-p" '+(a?'':'disabled')+' onclick="nextStep()">'+(qi===qs.length-1?'Finish -->':'Next -->')+'</button></div>';return h}
function genHash(s){var h=5381;for(var i=0;i<s.length;i++)h=((h<<5)+h)+s.charCodeAt(i);return 'XAI-CP3-'+('000000'+Math.abs(h).toString(16).toUpperCase()).slice(-6)}
function submitCompletion(hash,pct,ds){if(FORM_URL.indexOf('PASTE')!==-1){alert('Google Form not configured.');return}window.open(FORM_URL+'?usp=pp_url&'+FIELD_NAME+'='+encodeURIComponent(userName)+'&'+FIELD_DATE+'='+encodeURIComponent(ds)+'&'+FIELD_COURSE+'='+encodeURIComponent(COURSE_NAME)+'&'+FIELD_SCORE+'='+encodeURIComponent(pct+'%')+'&'+FIELD_HASH+'='+encodeURIComponent(hash),'_blank')}
function renderDone(){var pct=Math.round(correct/qs.length*100);var passed=pct>=80;var now=new Date();var ds=now.toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});var h='<div class="done-wrap">';
if(passed){h+='<div class="done-icon">&#x1f6e1;</div><h2>Congratulations, '+userName+'!</h2><p>You have successfully completed Business Contingency / Disaster Recovery Training (CP-3) aligned to NIST SP 800-34 Rev. 1. This record should be retained as evidence for ConMon and 3PAO assessments.</p>'}
else{h+='<div class="done-icon">&#x1f4cb;</div><h2>Review Recommended</h2><p>'+userName+', you scored below the 80% passing threshold. Review the content sections and retake the quiz when ready.</p>'}
h+='<div class="score '+(passed?'pass':'fail')+'">'+pct+'%</div><p style="font-family:var(--mono);font-size:11px;color:var(--dim)">'+correct+' / '+qs.length+' CORRECT</p>';
if(passed){var hash=genHash(userName+ds+pct+correct);h+='<div class="cert"><div class="cert-lbl">CP-3 Training Completion Record</div>';
h+='<div class="cert-row">Name: <span>'+userName+'</span></div>';
h+='<div class="cert-row">Course: <span>Business Contingency / Disaster Recovery (CP-3)</span></div>';
h+='<div class="cert-row">Framework: <span>NIST SP 800-34 Rev. 1 / NIST 800-53</span></div>';
h+='<div class="cert-row">Score: <span>'+pct+'% ('+correct+'/'+qs.length+')</span></div>';
h+='<div class="cert-row">Date: <span>'+ds+'</span></div>';
h+='<div class="cert-row">Completion ID: <span style="color:var(--accent);letter-spacing:.08em">'+hash+'</span></div>';
h+='<div class="cert-row">Topics: <span>BIA, RTO/RPO, Backup Strategies, Alternate Sites, DR Roles, Plan Activation, Testing</span></div></div>';
h+='<br/><button class="btn btn-p" onclick="submitCompletion(\''+hash+'\','+pct+',\''+ds+'\')">Submit Completion Record</button>&nbsp;&nbsp;'}
h+='<br/><br/><button class="btn '+(passed?'btn-g':'btn-p')+'" onclick="restart()">Retake</button></div>';return h}
function render(){var s=steps[step];var h='';if(s.type==='reg')h=renderReg();else if(s.type==='c')h=renderContent(s.id);else if(s.type==='q')h=renderQuiz(s.id);else h=renderDone();document.getElementById('root').innerHTML=h;updateProg()}
function restart(){step=0;answers={};correct=0;render();window.scrollTo(0,0)}
render();
</script>
</body>
</html>
