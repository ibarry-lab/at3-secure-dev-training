<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Secure Developer / CI-CD Role-Based Training | AT-3 | IL5 / FedRAMP High</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e14;--surface:#111722;--surface2:#1a2233;--border:#1f2d47;
  --accent:#00d4ff;--accent2:#ff6b35;--green:#00ff9f;--red:#ff4757;
  --yellow:#ffd32a;--text:#c8d8f0;--dim:#5a7aa0;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
header{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:14px 16px;position:sticky;top:0;z-index:50;
  display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;
}
.badges{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.badge{font-family:var(--mono);font-size:9px;letter-spacing:.1em;padding:3px 7px;border:1px solid}
.badge-blue{color:var(--accent);border-color:var(--accent)}
.badge-yellow{color:var(--yellow);border-color:var(--yellow)}
.badge-red{color:var(--red);border-color:var(--red)}
.hdr-title{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--dim)}
.prog-wrap{display:flex;align-items:center;gap:8px}
.prog-label{font-family:var(--mono);font-size:11px;color:var(--dim);white-space:nowrap}
.prog-outer{width:80px;height:3px;background:var(--border)}
.prog-inner{height:100%;background:var(--accent);box-shadow:0 0 6px var(--accent);transition:width .4s}
.main{max-width:700px;margin:0 auto;padding:28px 16px 80px}
.sec-num{font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:.12em;margin-bottom:6px}
.sec-title{font-size:22px;font-weight:700;color:#fff;margin-bottom:8px;line-height:1.2}
.sec-desc{font-size:13px;color:var(--dim);line-height:1.6;margin-bottom:24px}
.card{background:var(--surface);border:1px solid var(--border);padding:20px 20px 20px 24px;margin-bottom:14px;position:relative}
.card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--accent)}
.card.warn::before{background:var(--yellow)}
.card.danger::before{background:var(--red)}
.card.ok::before{background:var(--green)}
.card-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
.card.warn .card-lbl{color:var(--yellow)}.card.danger .card-lbl{color:var(--red)}.card.ok .card-lbl{color:var(--green)}
.card h3{font-size:14px;font-weight:600;color:#fff;margin-bottom:8px}
.card p,.card li{font-size:13px;color:var(--text);line-height:1.65}
.card ul{list-style:none;padding:0}
.card ul li{padding:4px 0 4px 14px;position:relative}
.card ul li::before{content:'>';position:absolute;left:0;color:var(--accent);font-weight:700}
table{width:100%;border-collapse:collapse;font-size:12px;margin-top:4px}
th{text-align:left;font-family:var(--mono);font-size:9px;letter-spacing:.08em;color:var(--dim);padding:6px 10px;border-bottom:1px solid var(--border);text-transform:uppercase}
td{padding:8px 10px;border-bottom:1px solid rgba(31,45,71,.5);color:var(--text);vertical-align:top;font-size:12px}
tr:last-child td{border:none}
.tag{display:inline-block;font-family:var(--mono);font-size:9px;padding:2px 5px;letter-spacing:.04em}
.t-blue{background:rgba(0,212,255,.1);color:var(--accent);border:1px solid rgba(0,212,255,.3)}
.t-red{background:rgba(255,71,87,.1);color:var(--red);border:1px solid rgba(255,71,87,.3)}
.t-yel{background:rgba(255,211,42,.1);color:var(--yellow);border:1px solid rgba(255,211,42,.3)}
.t-grn{background:rgba(0,255,159,.1);color:var(--green);border:1px solid rgba(0,255,159,.3)}
.quiz-box{background:var(--surface);border:1px solid var(--border);padding:24px 20px;position:relative}
.quiz-box::before{content:'';position:absolute;top:0;left:0;width:100%;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.q-counter{font-family:var(--mono);font-size:10px;color:var(--dim);margin-bottom:12px}
.q-text{font-size:15px;font-weight:600;color:#fff;line-height:1.5;margin-bottom:20px}
.options{display:flex;flex-direction:column;gap:8px}
.opt{background:var(--surface2);border:1px solid var(--border);padding:12px 14px;cursor:pointer;display:flex;gap:10px;align-items:flex-start;font-size:13px;color:var(--text);text-align:left;width:100%;transition:border-color .15s}
.opt:hover{border-color:var(--accent);color:#fff}
.opt.correct{border-color:var(--green);background:rgba(0,255,159,.05);color:var(--green)}
.opt.wrong{border-color:var(--red);background:rgba(255,71,87,.05);color:var(--red)}
.opt.off{cursor:default;pointer-events:none}
.opt-letter{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--accent);min-width:16px;padding-top:1px}
.opt.correct .opt-letter{color:var(--green)}.opt.wrong .opt-letter{color:var(--red)}
.feedback{margin-top:16px;padding:13px 14px;border-left:3px solid var(--green);font-size:13px;color:var(--text);line-height:1.6;display:none}
.feedback.show{display:block}.feedback.bad{border-color:var(--red)}
.feedback strong{color:#fff}
.nav{display:flex;align-items:center;justify-content:space-between;margin-top:28px}
.dots{display:flex;gap:5px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--border)}
.dot.active{background:var(--accent);box-shadow:0 0 5px var(--accent)}
.dot.done{background:var(--green)}
.btn{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:10px 20px;border:1px solid;cursor:pointer;background:transparent;transition:all .15s}
.btn-p{border-color:var(--accent);color:var(--accent)}
.btn-p:hover{background:var(--accent);color:var(--bg)}
.btn-p:disabled{opacity:.3;cursor:default;pointer-events:none}
.btn-g{border-color:var(--border);color:var(--dim)}
.btn-g:hover{border-color:var(--dim);color:var(--text)}
.done-wrap{text-align:center;padding:48px 0}
.done-icon{font-size:44px;margin-bottom:16px}
.done-wrap h2{font-size:24px;font-weight:700;color:#fff;margin-bottom:8px}
.done-wrap p{font-size:13px;color:var(--dim);max-width:420px;margin:0 auto 24px;line-height:1.6}
.score{font-family:var(--mono);font-size:44px;font-weight:600;color:var(--green);text-shadow:0 0 24px rgba(0,255,159,.4);margin:16px 0 4px}
.cert{border:1px solid var(--border);background:var(--surface);padding:20px 24px;display:inline-block;text-align:left;margin-top:20px;max-width:400px;width:100%}
.cert-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:var(--accent);margin-bottom:12px;text-transform:uppercase}
.cert-row{font-family:var(--mono);font-size:11px;color:var(--dim);margin-bottom:4px}
.cert-row span{color:var(--text)}
.score.pass{color:var(--green)}.score.fail{color:var(--red)}
.reg-box{background:var(--surface);border:1px solid var(--border);padding:32px 28px;max-width:420px;margin:0 auto}
.reg-box label{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--dim);text-transform:uppercase;margin-bottom:6px}
.reg-box input{width:100%;background:var(--surface2);border:1px solid var(--border);color:#fff;font-family:var(--sans);font-size:14px;padding:10px 12px;margin-bottom:20px;outline:none;transition:border-color .15s}
.reg-box input:focus{border-color:var(--accent)}
.reg-box input[readonly]{color:var(--dim);cursor:default}
</style>
</head>
<body>
<header>
  <div class="badges">
    <div class="badge badge-blue">IL5 / FEDRAMP HIGH</div>
    <div class="badge badge-red">AT-3</div>
    <div class="badge badge-yellow">FOR OFFICIAL USE ONLY</div>
    <div class="hdr-title">Secure Developer / CI-CD Role-Based Training</div>
  </div>
  <div class="prog-wrap">
    <span class="prog-label" id="plbl">0/9</span>
    <div class="prog-outer"><div class="prog-inner" id="pbar" style="width:0%"></div></div>
  </div>
</header>

<div class="main" id="root"></div>

<script>
/* ── GOOGLE FORM CONFIG ──────────────────────────────────────────────
   1. Create a Google Form with 5 Short Answer fields:
      Full Name, Completion Date, Course, Score, Completion Hash
   2. Click ⋮ → Get pre-filled link → fill dummy values → Get link
   3. Paste the entry IDs below (the entry.XXXXXXXXX values from the URL)
   4. Set FORM_URL to your form's base URL
   ──────────────────────────────────────────────────────────────────── */
var FORM_URL   = 'PASTE_YOUR_GOOGLE_FORM_URL_HERE';
var FIELD_NAME   = 'entry.XXXXXXXXX';
var FIELD_DATE   = 'entry.XXXXXXXXX';
var FIELD_COURSE = 'entry.XXXXXXXXX';
var FIELD_SCORE  = 'entry.XXXXXXXXX';
var FIELD_HASH   = 'entry.XXXXXXXXX';
var COURSE_NAME  = 'Secure Developer / CI-CD Role-Based Training (AT-3)';

var step = 0;
var answers = {};
var correct = 0;
var userName = '';

var steps = [
  {type:'reg'},
  {type:'c',id:'intro'},
  {type:'c',id:'sdlc'},
  {type:'c',id:'cicd'},
  {type:'c',id:'controls'},
  {type:'q',id:0},
  {type:'q',id:1},
  {type:'q',id:2},
  {type:'q',id:3},
  {type:'q',id:4},
  {type:'q',id:5},
  {type:'q',id:6},
  {type:'done'}
];

var qs = [
  {
    q:'Under NIST SP 800-53 Rev 5, what does AT-3 specifically require for personnel with significant security responsibilities, such as developers deploying code to an IL5 production environment?',
    opts:[
      'Annual general cybersecurity awareness training is sufficient for all personnel.',
      'Role-based security training tailored to their assigned duties before granting access, with refresher training annually or upon significant system/role changes.',
      'Developers only need training if they handle cryptographic keys directly.',
      'Training is recommended but not mandatory; it is at the discretion of the ISSM.'
    ],
    ans:1,
    fb:'<strong>Correct.</strong> AT-3 mandates role-based security training that is tailored to the individual\'s assigned role and responsibilities. For developers in IL5 environments, this includes secure coding practices, CI/CD pipeline security, and handling of CUI/CDI. Training must occur before access is provisioned and be refreshed annually or when significant changes occur to the system, role, or threat landscape.'
  },
  {
    q:'Your CI/CD pipeline builds a container image and pushes it to a registry used by production IL5 workloads. Which of the following is the MOST critical security control for maintaining artifact integrity?',
    opts:[
      'Requiring all developers to use the same IDE with approved plugins.',
      'Cryptographically signing build artifacts at the pipeline level and verifying signatures before deployment to production.',
      'Running a vulnerability scan on the source code repository once per quarter.',
      'Storing build logs in a shared team drive for manual review.'
    ],
    ans:1,
    fb:'<strong>Correct.</strong> Under SI-7 (Software, Firmware, and Information Integrity) and SA-10, build artifacts must be cryptographically signed at the pipeline level. The production deployment stage must verify these signatures before admitting any artifact. This establishes a tamper-evident chain of custody from source to runtime, a core requirement for IL5 and FedRAMP High. Tools like Sigstore/cosign or Notation can be integrated directly into the pipeline.'
  },
  {
    q:'A developer accidentally commits an Azure Government service principal secret to a Git repository within the authorization boundary. What is the CORRECT immediate response sequence?',
    opts:[
      'Delete the commit from Git history using a force push and notify the developer privately.',
      'Rotate the compromised credential immediately, revoke the old secret, scan all branches and history for additional secrets, report the incident to the ISSM per IR procedures, and update pipeline guardrails to prevent recurrence.',
      'Add the secret to .gitignore to prevent future exposure and document the event in the next quarterly review.',
      'File a POA&M item and schedule remediation for the next sprint.'
    ],
    ans:1,
    fb:'<strong>Correct.</strong> A credential exposure in an IL5 boundary is a security incident, not a housekeeping item. The sequence is: (1) immediately rotate/revoke the credential, (2) scan all branches, tags, and history for additional exposure, (3) report to the ISSM under IR-6 within the defined notification window, (4) implement pre-commit hooks and pipeline secret scanning (e.g., gitleaks, truffleHog) as preventive controls under SI-7 and SA-11. Force-pushing alone does not purge secrets from remote mirrors, forks, or CI caches.'
  },
  {
    q:'Your team uses a GitOps model where merging to the main branch triggers an automatic deployment to the IL5 production environment. Under CM-3 (Configuration Change Control), what is REQUIRED before any merge to main?',
    opts:[
      'At least one peer approval on the pull request is sufficient.',
      'Documented change request, security impact analysis (CM-4), approval from the CCB or designated authority, successful passage of automated security gates (SAST, SCA, unit tests), and an auditable record linking the change to its approval.',
      'The developer must verbally notify the team lead before merging.',
      'Automated tests passing is the only requirement; manual review slows velocity unnecessarily.'
    ],
    ans:1,
    fb:'<strong>Correct.</strong> CM-3 requires a formal configuration change control process. In a GitOps/CI-CD model this translates to: (1) a documented change request (the PR itself with linked ticket), (2) a security impact analysis per CM-4, (3) approval from authorized personnel (CCB or delegated authority), (4) automated security gates that must pass before merge, and (5) an immutable audit trail. Peer review alone does not satisfy the CCB approval requirement, and skipping impact analysis violates CM-4.'
  },
  {
    q:'A SAST scan in your pipeline identifies a critical SQL injection vulnerability (CWE-89) in code scheduled for release to the IL5 production environment. The product owner insists on shipping on schedule. What is the correct action?',
    opts:[
      'Deploy the code and create a POA&M to track remediation post-release.',
      'Block the release. A critical injection vulnerability cannot be deployed to production. Remediate the finding, re-scan to confirm the fix, and then proceed through the change control process.',
      'Deploy to production with a WAF rule as a temporary compensating control and fix it in the next sprint.',
      'Escalate to the ISSM to request a risk acceptance waiver and deploy immediately.'
    ],
    ans:1,
    fb:'<strong>Correct.</strong> Under SA-11 (Developer Testing and Evaluation) and SI-10 (Information Input Validation), critical injection vulnerabilities must be remediated before deployment to production. FedRAMP requires that High findings be remediated within 30 days, but knowingly deploying a critical, exploitable vulnerability violates the principle of due diligence and could constitute a failure to maintain the security posture required by the ATO. The pipeline should enforce a hard gate that blocks deployment on critical SAST/DAST findings.'
  },
  {
    q:'Which of the following BEST describes the principle of least privilege as applied to CI/CD service accounts in an IL5 environment?',
    opts:[
      'CI/CD service accounts should use a shared admin credential stored in the pipeline environment variables for simplicity.',
      'Each pipeline stage should use a dedicated service account with only the minimum permissions required for that stage, credentials should be injected at runtime from a secrets vault, and access should be logged and reviewed.',
      'Service accounts need broad permissions to avoid pipeline failures; restrict human accounts instead.',
      'Least privilege only applies to interactive user accounts, not to automated service accounts.'
    ],
    ans:1,
    fb:'<strong>Correct.</strong> AC-6 (Least Privilege) applies to all accounts, including non-interactive service accounts used by CI/CD pipelines. Each stage (build, test, scan, deploy) should use a separate service account scoped to only the resources it needs. Credentials must never be stored in pipeline environment variables or code; they should be injected at runtime from an approved secrets vault (e.g., Azure Key Vault, HashiCorp Vault). All service account access must be logged per AU-2 and reviewed per AC-6(9).'
  },
  {
    q:'During a FedRAMP High annual assessment, the 3PAO asks to see evidence that your development team has completed AT-3 role-based training. Which set of artifacts BEST satisfies this requirement?',
    opts:[
      'A screenshot showing the training slides were emailed to the team distribution list.',
      'Individual completion records with names, dates, course title, quiz scores meeting the passing threshold, mapped to each developer\'s role and system access level, plus the training curriculum showing alignment to NIST 800-53 controls.',
      'A signed memo from the engineering manager attesting that all developers have been trained.',
      'Calendar invites showing a one-hour training session was scheduled for the team.'
    ],
    ans:1,
    fb:'<strong>Correct.</strong> 3PAO assessors require verifiable, individual-level evidence for AT-3. This includes: (1) individual completion records (not bulk attestations), (2) the training content/curriculum demonstrating alignment to the specific NIST controls relevant to the role, (3) assessment results showing knowledge was validated (quiz scores), and (4) mapping of training to the individual\'s role and the system(s) they access. Calendar invites and bulk emails do not constitute evidence of completion or comprehension.'
  }
];

function dots(){
  var total = steps.filter(function(s){return s.type!=='done'&&s.type!=='reg';}).length;
  return steps.filter(function(s){return s.type!=='done'&&s.type!=='reg';}).map(function(s,i){
    var idx=steps.indexOf(s);
    var c='dot';
    if(idx<step) c+=' done';
    else if(idx===step) c+=' active';
    return '<div class="'+c+'"></div>';
  }).join('');
}

function nextStep(){
  if(step<steps.length-1){step++;render();window.scrollTo(0,0);}
}

function updateProg(){
  var total=steps.filter(function(s){return s.type!=='done'&&s.type!=='reg';}).length;
  var cur=Math.max(0,step-1);
  var pct=Math.round((cur/total)*100);
  document.getElementById('pbar').style.width=pct+'%';
  document.getElementById('plbl').textContent=cur+'/'+total;
}

function answerQ(qi,chosen){
  if(answers[qi]!==undefined) return;
  answers[qi]=chosen;
  if(chosen===qs[qi].ans) correct++;
  render();
}

function card(type,label,heading,bodyOrItems){
  var cls='card'+(type==='warn'?' warn':type==='danger'?' danger':type==='ok'?' ok':'');
  var body='';
  if(typeof bodyOrItems==='string'){
    body='<p>'+bodyOrItems+'</p>';
  } else {
    body='<ul>'+bodyOrItems.map(function(i){return '<li>'+i+'</li>';}).join('')+'</ul>';
  }
  return '<div class="'+cls+'"><div class="card-lbl">'+label+'</div><h3>'+heading+'</h3>'+body+'</div>';
}

function renderReg(){
  var now=new Date();
  var ds=now.toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  var html='<div class="sec-num">REGISTRATION</div>';
  html+='<div class="sec-title">Secure Developer / CI-CD Role-Based Training</div>';
  html+='<div class="sec-desc">AT-3 | IL5 / FedRAMP High / NIST 800-53r5 | 80% passing score required</div>';
  html+='<div class="reg-box">';
  html+='<label>Full Name (as it will appear on your completion record)</label>';
  html+='<input type="text" id="regName" placeholder="e.g. Jane Doe" value="'+userName+'" autocomplete="name"/>';
  html+='<label>Date</label>';
  html+='<input type="text" value="'+ds+'" readonly/>';
  html+='<button class="btn btn-p" style="width:100%" onclick="startTraining()">Begin Training --></button>';
  html+='</div>';
  return html;
}
function startTraining(){
  var n=document.getElementById('regName').value.trim();
  if(!n){document.getElementById('regName').style.borderColor='var(--red)';return;}
  userName=n;
  nextStep();
}

function renderContent(id){
  var html='';
  if(id==='intro'){
    html+='<div class="sec-num">01 -- OVERVIEW</div>';
    html+='<div class="sec-title">Secure Developer &amp; CI/CD Role-Based Training</div>';
    html+='<div class="sec-desc">AT-3 requires role-based security training for all personnel with significant security responsibilities. As a developer or CI/CD engineer operating within an IL5 / FedRAMP High authorization boundary, you are a direct custodian of the security posture.</div>';

    html+=card('','Why This Training Exists','AT-3: Role-Based Security Training',
      'NIST SP 800-53 Rev 5 control AT-3 mandates that organizations provide role-based security training to personnel with assigned security roles and responsibilities. Developers who write, review, build, and deploy code into a FedRAMP High or IL5 environment hold significant security responsibility. This training fulfills your AT-3 obligation and must be completed before system access is provisioned, with annual refresher thereafter.');

    html+=card('warn','Authorization Boundary','Your Code Runs Inside the Boundary',
      'Every line of code you merge, every container you build, and every pipeline you configure operates within the FedRAMP High / IL5 authorization boundary. This boundary protects CUI and Controlled Defense Information (CDI). A vulnerability you introduce, a secret you expose, or a pipeline you misconfigure can directly compromise that boundary and the data it protects.');

    html+=card('danger','Common Developer Risk Vectors','Where Security Incidents Originate',[
      'Hardcoded secrets, API keys, or credentials committed to source control',
      'Unpatched or vulnerable third-party dependencies (supply chain risk)',
      'CI/CD pipelines with overprivileged service accounts or no artifact signing',
      'Missing or bypassed security gates (SAST/DAST/SCA) before production deployment',
      'Infrastructure-as-Code misconfigurations (open security groups, public endpoints)',
      'Lack of code review or unauthorized direct pushes to protected branches',
      'Container images built from unvetted or non-hardened base images'
    ]);

    html+=card('ok','Training Objectives','What You Will Learn',[
      'Secure Software Development Lifecycle (SSDLC) requirements for IL5 / FedRAMP High',
      'CI/CD pipeline security controls: artifact signing, secret management, gate enforcement',
      'Change management and configuration control under CM-3 and CM-4',
      'Your incident reporting obligations when security events occur in dev/CI-CD workflows',
      'Evidence and artifacts required for 3PAO assessments and ConMon'
    ]);

  } else if(id==='sdlc'){
    html+='<div class="sec-num">02 -- SECURE DEVELOPMENT LIFECYCLE</div>';
    html+='<div class="sec-title">Building Secure Code in an IL5 Environment</div>';
    html+='<div class="sec-desc">Every phase of the development lifecycle has specific security requirements under FedRAMP High and DoD IL5.</div>';

    html+=card('','Secure Coding Standards','SA-15: Development Process, Standards, and Tools',[
      'Follow OWASP Top 10 and CWE/SANS Top 25 as minimum secure coding baselines',
      'All code must be written in approved languages and frameworks documented in the SSP',
      'Input validation is mandatory on all data crossing trust boundaries (SI-10)',
      'Output encoding is required to prevent injection and XSS (SI-10)',
      'Cryptographic operations must use FIPS 140-2/140-3 validated modules (SC-13)',
      'Error handling must not expose stack traces, internal paths, or system details to users'
    ]);

    html+=card('warn','Code Review Requirements','Peer Review Is a Security Control',[
      'All code changes require at least one peer review before merge (SA-11, CM-3)',
      'Reviewers must verify: input validation, authentication/authorization logic, error handling, and absence of hardcoded secrets',
      'Direct pushes to main/release branches must be blocked via branch protection rules',
      'Review comments and approvals must be retained as audit evidence for 3PAO assessments',
      'Security-sensitive changes (auth, crypto, IAM, network config) require review by a designated security reviewer'
    ]);

    html+=card('danger','Dependency Management','Supply Chain Is Your Attack Surface',[
      'All third-party dependencies must be scanned for known vulnerabilities using SCA tools (SR-3, SA-11)',
      'Critical and High CVEs in dependencies must be remediated within 30 days per FedRAMP operational requirements',
      'Pin dependency versions explicitly; do not use floating version ranges in production builds',
      'Maintain a Software Bill of Materials (SBOM) for all production applications (SR-4)',
      'Evaluate new dependencies for licensing, maintenance status, and known supply chain compromises before adoption',
      'Dependencies must be pulled from approved, vetted registries -- not arbitrary public sources'
    ]);

    html+=card('ok','Security Testing','SA-11: Developer Testing and Evaluation',[
      'Static Application Security Testing (SAST) must run on every pull request',
      'Dynamic Application Security Testing (DAST) must run against staging before production promotion',
      'Software Composition Analysis (SCA) must scan all dependencies on every build',
      'Container image scanning must occur before images are pushed to the production registry',
      'Critical/High findings from any security scan must block deployment to production',
      'All scan results must be retained as evidence and integrated into the ISCM program'
    ]);

  } else if(id==='cicd'){
    html+='<div class="sec-num">03 -- CI/CD PIPELINE SECURITY</div>';
    html+='<div class="sec-title">Hardening the Build and Deployment Pipeline</div>';
    html+='<div class="sec-desc">The CI/CD pipeline is a privileged pathway into production. It must be treated as critical infrastructure within the authorization boundary.</div>';

    html+=card('','Pipeline Architecture','Defense in Depth for CI/CD',[
      'Pipelines must run on hardened, ephemeral build agents within the authorization boundary',
      'Build environments must be isolated from production networks (SC-7)',
      'Pipeline definitions (YAML, Jenkinsfiles, etc.) are configuration items under CM-3 and must follow change control',
      'All pipeline modifications require peer review and approval through the same CCB process as application code',
      'Pipeline execution logs must be immutable and retained per AU-9 and AU-11 requirements'
    ]);

    html+=card('warn','Secrets Management','Never Store Secrets in Code or Pipeline Config',[
      'All secrets (API keys, credentials, certificates) must be stored in an approved secrets vault (e.g., Azure Key Vault, HashiCorp Vault)',
      'Secrets must be injected at runtime, never stored in environment variables, pipeline YAML, or source code',
      'Implement pre-commit hooks to scan for secrets before code is pushed (e.g., gitleaks, detect-secrets)',
      'Rotate all service account credentials on a defined schedule and immediately upon suspected compromise',
      'Access to the secrets vault must follow AC-6 (Least Privilege) and be audited per AU-2'
    ]);

    html+=card('danger','Artifact Integrity','SI-7: Tamper-Evident Build Chain',[
      'All build artifacts (containers, binaries, packages) must be cryptographically signed at the pipeline level',
      'Production deployment must verify artifact signatures before admission (admission controllers, policy engines)',
      'Container images must reference content-addressable digests (SHA256), not mutable tags like "latest"',
      'Base images must come from an approved, hardened image registry maintained by the platform team',
      'Build provenance metadata (who, what, when, from which commit) must be attached to every artifact',
      'Any artifact that fails signature verification or provenance checks must be rejected automatically'
    ]);

    html+=card('ok','Change Management in CI/CD','CM-3 and CM-4 in a GitOps Model',[
      'Every change to production must be traceable: commit -> PR -> approval -> build -> deploy -> audit log',
      'Security impact analysis (CM-4) must be performed and documented for every change',
      'Emergency changes must follow a documented emergency change process with retroactive CCB review within 48 hours',
      'Rollback procedures must be documented and tested for every deployment mechanism',
      'Environment promotion must follow a defined path: dev -> staging -> production, with security gates at each transition',
      'All change records must be retained and available for 3PAO review'
    ]);

  } else if(id==='controls'){
    html+='<div class="sec-num">04 -- NIST CONTROL MAPPINGS</div>';
    html+='<div class="sec-title">Key Controls for Secure Development &amp; CI/CD</div>';
    html+='<div class="sec-desc">NIST SP 800-53 Rev 5 controls most directly applicable to your role as a developer or CI/CD engineer.</div>';

    var rows=[
      ['AT-3','Role-Based Training','P1','Tailored security training for personnel with significant security roles; must occur before access and annually thereafter.'],
      ['SA-10','Developer Configuration Mgmt','P1','Developers must track and control changes to the system during development, implement only approved changes, and document the configuration.'],
      ['SA-11','Developer Testing &amp; Evaluation','P1','Security testing (SAST, DAST, SCA, fuzz testing) integrated into the SDLC; results drive remediation before release.'],
      ['SA-15','Dev Process &amp; Standards','P2','Requires documented development standards, tools, and processes; covers secure coding standards and tool approval.'],
      ['CM-3','Configuration Change Control','P1','Formal change control for all modifications to the system; includes approval, testing, and documentation.'],
      ['CM-4','Impact Analyses','P2','Security impact analysis before implementing changes to determine effects on the security posture.'],
      ['SI-7','Software &amp; Info Integrity','P1','Integrity verification mechanisms (signing, hashing) for software and information; detects unauthorized changes.'],
      ['SI-10','Information Input Validation','P1','Checking information inputs for accuracy, completeness, validity, and authenticity. Prevents injection attacks.'],
      ['AC-6','Least Privilege','P1','Restricting access rights to the minimum necessary; applies to developer accounts, service accounts, and CI/CD roles.'],
      ['AU-2','Event Logging','P1','Defines events that must be logged: code changes, pipeline runs, deployments, access to secrets, config changes.'],
      ['SC-13','Cryptographic Protection','P1','Use of FIPS-validated cryptography; applies to artifact signing, TLS, data encryption, and secure key management.'],
      ['SR-4','Provenance','P1','Tracking the origin and chain of custody of components; includes SBOM generation and artifact provenance.']
    ];

    html+='<div class="card" style="padding:0;overflow:auto"><table><thead><tr><th>Control</th><th>Name</th><th>Pri</th><th>Summary</th></tr></thead><tbody>';
    rows.forEach(function(r){
      html+='<tr><td><span class="tag t-blue">'+r[0]+'</span></td><td style="color:#fff;font-weight:600">'+r[1]+'</td><td><span class="tag '+(r[2]==='P1'?'t-red':'t-yel')+'">'+r[2]+'</span></td><td>'+r[3]+'</td></tr>';
    });
    html+='</tbody></table></div>';
  }

  html+='<div class="nav"><div class="dots">'+dots()+'</div><button class="btn btn-p" onclick="nextStep()">'+(id==='controls'?'Start Quiz -->':'Continue -->')+'</button></div>';
  return html;
}

function renderQuiz(qi){
  var q=qs[qi];
  var answered=answers[qi]!==undefined;
  var html='';
  html+='<div class="sec-num">KNOWLEDGE CHECK</div>';
  html+='<div class="sec-title">Quiz</div>';
  html+='<div class="quiz-box">';
  html+='<div class="q-counter">QUESTION '+(qi+1)+' / '+qs.length+'</div>';
  html+='<div class="q-text">'+q.q+'</div>';
  html+='<div class="options">';
  var letters=['A','B','C','D'];
  q.opts.forEach(function(o,i){
    var cls='opt';
    if(answered){
      cls+=' off';
      if(i===q.ans) cls+=' correct';
      else if(i===answers[qi]) cls+=' wrong';
    }
    html+='<button class="'+cls+'" onclick="answerQ('+qi+','+i+')">';
    html+='<span class="opt-letter">'+letters[i]+'</span><span>'+o+'</span></button>';
  });
  html+='</div>';
  var isCorrect=answered&&answers[qi]===q.ans;
  html+='<div class="feedback'+(answered?' show':'')+(answered&&!isCorrect?' bad':'')+'">'+(answered?(isCorrect?'+ ':'x ')+q.fb:'')+'</div>';
  html+='</div>';
  var isLast=qi===qs.length-1;
  html+='<div class="nav"><div class="dots">'+dots()+'</div><button class="btn btn-p" id="nbtn" '+(answered?'':'disabled')+' onclick="nextStep()">'+(isLast?'Finish -->':'Next -->')+'</button></div>';
  return html;
}

function genHash(str){
  var h=5381;
  for(var i=0;i<str.length;i++) h=((h<<5)+h)+str.charCodeAt(i);
  return 'XAI-AT3-'+('000000'+Math.abs(h).toString(16).toUpperCase()).slice(-6);
}

function submitCompletion(hash,pct,ds){
  if(FORM_URL.indexOf('PASTE')!==-1){alert('Google Form not configured yet. Please send a screenshot of your completion record to your ISSM.');return;}
  var url=FORM_URL+'?usp=pp_url'
    +'&'+FIELD_NAME+'='+encodeURIComponent(userName)
    +'&'+FIELD_DATE+'='+encodeURIComponent(ds)
    +'&'+FIELD_COURSE+'='+encodeURIComponent(COURSE_NAME)
    +'&'+FIELD_SCORE+'='+encodeURIComponent(pct+'%')
    +'&'+FIELD_HASH+'='+encodeURIComponent(hash);
  window.open(url,'_blank');
}

function renderDone(){
  var pct=Math.round((correct/qs.length)*100);
  var passed=pct>=80;
  var now=new Date();
  var ds=now.toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  var html='<div class="done-wrap">';
  if(passed){
    html+='<div class="done-icon">&#x1f6e1;</div>';
    html+='<h2>Congratulations, '+userName+'!</h2>';
    html+='<p>You have successfully completed Secure Developer / CI-CD Role-Based Training (AT-3) for IL5 / FedRAMP High environments. This record should be retained as evidence for ConMon and 3PAO assessments.</p>';
  } else {
    html+='<div class="done-icon">&#x1f4cb;</div>';
    html+='<h2>Review Recommended</h2>';
    html+='<p>'+userName+', you scored below the 80% passing threshold. Review the content sections and retake the quiz when ready.</p>';
  }
  html+='<div class="score '+(passed?'pass':'fail')+'">'+pct+'%</div>';
  html+='<p style="font-family:var(--mono);font-size:11px;color:var(--dim)">'+correct+' / '+qs.length+' CORRECT</p>';
  if(passed){
    var hash=genHash(userName+ds+pct+correct);
    html+='<div class="cert"><div class="cert-lbl">AT-3 Training Completion Record</div>';
    html+='<div class="cert-row">Name: <span>'+userName+'</span></div>';
    html+='<div class="cert-row">Course: <span>Secure Developer / CI-CD Role-Based Training</span></div>';
    html+='<div class="cert-row">Framework: <span>IL5 / FedRAMP High / NIST 800-53r5</span></div>';
    html+='<div class="cert-row">Control: <span>AT-3 (Role-Based Training)</span></div>';
    html+='<div class="cert-row">Score: <span>'+pct+'% ('+correct+'/'+qs.length+')</span></div>';
    html+='<div class="cert-row">Date: <span>'+ds+'</span></div>';
    html+='<div class="cert-row">Completion ID: <span style="color:var(--accent);letter-spacing:.08em">'+hash+'</span></div>';
    html+='<div class="cert-row">Controls Covered: <span>AT-3, SA-10, SA-11, SA-15, CM-3, CM-4, SI-7, SI-10, AC-6, AU-2, SC-13, SR-4</span></div>';
    html+='</div>';
    html+='<br/><button class="btn btn-p" onclick="submitCompletion(\''+hash+'\','+pct+',\''+ds+'\')">Submit Completion Record</button>&nbsp;&nbsp;';
  }
  html+='<br/><br/><button class="btn '+(passed?'btn-g':'btn-p')+'" onclick="restart()">Retake</button>';
  html+='</div>';
  return html;
}

function render(){
  var s=steps[step];
  var html='';
  if(s.type==='reg') html=renderReg();
  else if(s.type==='c') html=renderContent(s.id);
  else if(s.type==='q') html=renderQuiz(s.id);
  else html=renderDone();
  document.getElementById('root').innerHTML=html;
  updateProg();
}

function restart(){
  step=0;answers={};correct=0;render();window.scrollTo(0,0);
}

render();
</script>
