<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Secure Developer / CI-CD Training | AT-3 | NIST SP 800-218 SSDF</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>*{box-sizing:border-box;margin:0;padding:0}:root{--bg:#0a0e14;--surface:#111722;--surface2:#1a2233;--border:#1f2d47;--accent:#00d4ff;--accent2:#ff6b35;--green:#00ff9f;--red:#ff4757;--yellow:#ffd32a;--text:#c8d8f0;--dim:#5a7aa0;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif}body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}.badges{display:flex;gap:6px;align-items:center;flex-wrap:wrap}.badge{font-family:var(--mono);font-size:9px;letter-spacing:.1em;padding:3px 7px;border:1px solid}.badge-blue{color:var(--accent);border-color:var(--accent)}.badge-yellow{color:var(--yellow);border-color:var(--yellow)}.badge-red{color:var(--red);border-color:var(--red)}.hdr-title{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--dim)}.prog-wrap{display:flex;align-items:center;gap:8px}.prog-label{font-family:var(--mono);font-size:11px;color:var(--dim);white-space:nowrap}.prog-outer{width:80px;height:3px;background:var(--border)}.prog-inner{height:100%;background:var(--accent);box-shadow:0 0 6px var(--accent);transition:width .4s}.main{max-width:700px;margin:0 auto;padding:28px 16px 80px}.sec-num{font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:.12em;margin-bottom:6px}.sec-title{font-size:22px;font-weight:700;color:#fff;margin-bottom:8px;line-height:1.2}.sec-desc{font-size:13px;color:var(--dim);line-height:1.6;margin-bottom:24px}.card{background:var(--surface);border:1px solid var(--border);padding:20px 20px 20px 24px;margin-bottom:14px;position:relative}.card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--accent)}.card.warn::before{background:var(--yellow)}.card.danger::before{background:var(--red)}.card.ok::before{background:var(--green)}.card-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}.card.warn .card-lbl{color:var(--yellow)}.card.danger .card-lbl{color:var(--red)}.card.ok .card-lbl{color:var(--green)}.card h3{font-size:14px;font-weight:600;color:#fff;margin-bottom:8px}.card p,.card li{font-size:13px;color:var(--text);line-height:1.65}.card ul{list-style:none;padding:0}.card ul li{padding:4px 0 4px 14px;position:relative}.card ul li::before{content:'>';position:absolute;left:0;color:var(--accent);font-weight:700}table{width:100%;border-collapse:collapse;font-size:12px;margin-top:4px}th{text-align:left;font-family:var(--mono);font-size:9px;letter-spacing:.08em;color:var(--dim);padding:6px 10px;border-bottom:1px solid var(--border);text-transform:uppercase}td{padding:8px 10px;border-bottom:1px solid rgba(31,45,71,.5);color:var(--text);vertical-align:top;font-size:12px}tr:last-child td{border:none}.tag{display:inline-block;font-family:var(--mono);font-size:9px;padding:2px 5px;letter-spacing:.04em}.t-blue{background:rgba(0,212,255,.1);color:var(--accent);border:1px solid rgba(0,212,255,.3)}.t-red{background:rgba(255,71,87,.1);color:var(--red);border:1px solid rgba(255,71,87,.3)}.t-yel{background:rgba(255,211,42,.1);color:var(--yellow);border:1px solid rgba(255,211,42,.3)}.quiz-box{background:var(--surface);border:1px solid var(--border);padding:24px 20px;position:relative}.quiz-box::before{content:'';position:absolute;top:0;left:0;width:100%;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2))}.q-counter{font-family:var(--mono);font-size:10px;color:var(--dim);margin-bottom:12px}.q-text{font-size:15px;font-weight:600;color:#fff;line-height:1.5;margin-bottom:20px}.options{display:flex;flex-direction:column;gap:8px}.opt{background:var(--surface2);border:1px solid var(--border);padding:12px 14px;cursor:pointer;display:flex;gap:10px;align-items:flex-start;font-size:13px;color:var(--text);text-align:left;width:100%;transition:border-color .15s}.opt:hover{border-color:var(--accent);color:#fff}.opt.correct{border-color:var(--green);background:rgba(0,255,159,.05);color:var(--green)}.opt.wrong{border-color:var(--red);background:rgba(255,71,87,.05);color:var(--red)}.opt.off{cursor:default;pointer-events:none}.opt-letter{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--accent);min-width:16px;padding-top:1px}.opt.correct .opt-letter{color:var(--green)}.opt.wrong .opt-letter{color:var(--red)}.feedback{margin-top:16px;padding:13px 14px;border-left:3px solid var(--green);font-size:13px;color:var(--text);line-height:1.6;display:none}.feedback.show{display:block}.feedback.bad{border-color:var(--red)}.feedback strong{color:#fff}.nav{display:flex;align-items:center;justify-content:space-between;margin-top:28px}.dots{display:flex;gap:5px;flex-wrap:wrap}.dot{width:6px;height:6px;border-radius:50%;background:var(--border)}.dot.active{background:var(--accent);box-shadow:0 0 5px var(--accent)}.dot.done{background:var(--green)}.btn{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:10px 20px;border:1px solid;cursor:pointer;background:transparent;transition:all .15s}.btn-p{border-color:var(--accent);color:var(--accent)}.btn-p:hover{background:var(--accent);color:var(--bg)}.btn-p:disabled{opacity:.3;cursor:default;pointer-events:none}.btn-g{border-color:var(--border);color:var(--dim)}.btn-g:hover{border-color:var(--dim);color:var(--text)}.done-wrap{text-align:center;padding:48px 0}.done-icon{font-size:44px;margin-bottom:16px}.done-wrap h2{font-size:24px;font-weight:700;color:#fff;margin-bottom:8px}.done-wrap p{font-size:13px;color:var(--dim);max-width:460px;margin:0 auto 24px;line-height:1.6}.score{font-family:var(--mono);font-size:44px;font-weight:600;text-shadow:0 0 24px rgba(0,255,159,.4);margin:16px 0 4px}.score.pass{color:var(--green)}.score.fail{color:var(--red)}.cert{border:1px solid var(--border);background:var(--surface);padding:20px 24px;display:inline-block;text-align:left;margin-top:20px;max-width:440px;width:100%}.cert-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:var(--accent);margin-bottom:12px;text-transform:uppercase}.cert-row{font-family:var(--mono);font-size:11px;color:var(--dim);margin-bottom:4px}.cert-row span{color:var(--text)}.reg-box{background:var(--surface);border:1px solid var(--border);padding:32px 28px;max-width:420px;margin:0 auto}.reg-box label{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--dim);text-transform:uppercase;margin-bottom:6px}.reg-box input{width:100%;background:var(--surface2);border:1px solid var(--border);color:#fff;font-family:var(--sans);font-size:14px;padding:10px 12px;margin-bottom:20px;outline:none;transition:border-color .15s}.reg-box input:focus{border-color:var(--accent)}.reg-box input[readonly]{color:var(--dim);cursor:default}</style>
</head>
<body>
<header><div class="badges"><div class="badge badge-blue">IL5 / FEDRAMP HIGH</div><div class="badge badge-red">AT-3</div><div class="badge badge-yellow">FOR OFFICIAL USE ONLY</div><div class="hdr-title">Secure Developer / CI-CD Training</div></div><div class="prog-wrap"><span class="prog-label" id="plbl">0/10</span><div class="prog-outer"><div class="prog-inner" id="pbar" style="width:0%"></div></div></div></header>
<div class="main" id="root"></div>
<script>
var FORM_URL='https://docs.google.com/forms/d/e/1FAIpQLSdHsEWs-iPTGncIBdIiFGaEnxl6MXMN6IHFnUVDGyG1Trf4fw/viewform';
var FIELD_NAME='entry.1084561241',FIELD_DATE='entry.989191631',FIELD_COURSE='entry.1455054579',FIELD_SCORE='entry.766034301',FIELD_HASH='entry.1157983501';
var COURSE_NAME='Secure Developer / CI-CD Training (AT-3 / SSDF)';
var step=0,answers={},correct=0,userName='';
var steps=[{type:'reg'},{type:'c',id:'who'},{type:'c',id:'coding'},{type:'c',id:'secrets'},{type:'c',id:'cicd'},{type:'c',id:'supply'},{type:'q',id:0},{type:'q',id:1},{type:'q',id:2},{type:'q',id:3},{type:'q',id:4},{type:'done'}];
var qs=[
{q:'According to NIST SP 800-218 SSDF, which Practice Group is responsible for ensuring software is designed and implemented with security built in?',opts:['PO -- Prepare the Organization: establish training, policies, and tooling','PS -- Protect the Software: secure code and artifacts from unauthorized access','PW -- Produce Well-Secured Software: design, code, and test with security integrated throughout','RV -- Respond to Vulnerabilities: identify and remediate security issues after discovery'],ans:2,fb:'<strong>Correct.</strong> PW (Produce Well-Secured Software) covers secure design, implementation, and testing. PO prepares the org, PS protects artifacts, RV handles vulnerability response.'},
{q:'A developer needs to use an API key in a CI/CD pipeline. Which approach is the MOST secure?',opts:['Hardcode the API key directly in the pipeline YAML file in the repository','Store the key in a base64-encoded environment variable committed to the repository','Store the API key in the platform\'s native secret store and inject it at runtime as a masked variable','Include the key in a .env file and add it to .gitignore'],ans:2,fb:'<strong>Correct.</strong> Platform secret stores provide encrypted storage with log masking. .gitignore is unreliable. Base64 is encoding, not encryption.'},
{q:'A dependency scanner reports a critical CVE in a transitive (indirect) dependency in your production application. What is the correct response timeline?',opts:['Remediate within 30 days -- transitive dependencies are lower priority','Remediate within 72 hours -- critical CVEs require urgent action regardless of dependency depth','Remediate at the next scheduled sprint','No action needed if the vulnerable code path is not directly called'],ans:1,fb:'<strong>Correct.</strong> Critical CVEs in production must be remediated within 72 hours whether direct or transitive. Both SolarWinds and Log4Shell were transitive dependency compromises.'},
{q:'To protect against supply chain attacks via malicious CI/CD actions, what is the BEST practice when referencing external actions in a pipeline?',opts:['Pin external actions to a version tag (e.g. actions/checkout@v3)','Always use @main or @latest for the most current version','Pin external actions to a specific immutable commit SHA -- version tags can be moved by attackers','Fork every external action into your organization\'s repository'],ans:2,fb:'<strong>Correct.</strong> Version tags are mutable -- a compromised maintainer can move a tag to malicious code. Commit SHAs are immutable, guaranteeing you run exactly the code you reviewed.'},
{q:'What is the primary purpose of generating a Software Bill of Materials (SBOM) as required by Executive Order 14028?',opts:['To provide a licensing document for legal compliance purposes only','To create a machine-readable component inventory enabling rapid identification of newly published vulnerabilities','To replace SCA scanning tools in the CI/CD pipeline','To satisfy a one-time procurement requirement'],ans:1,fb:'<strong>Correct.</strong> An SBOM (CycloneDX or SPDX format) enables automated CVE correlation -- when a new vulnerability is published, tooling immediately identifies all affected software. It must be regenerated on every release.'}
];
function dots(){var v=steps.filter(function(s){return s.type!=='done'&&s.type!=='reg'});return v.map(function(s){var idx=steps.indexOf(s);var c='dot';if(idx<step)c+=' done';else if(idx===step)c+=' active';return '<div class="'+c+'"></div>'}).join('')}
function nextStep(){if(step<steps.length-1){step++;render();window.scrollTo(0,0)}}
function updateProg(){var t=steps.filter(function(s){return s.type!=='done'&&s.type!=='reg'}).length;var c=Math.max(0,step-1);document.getElementById('pbar').style.width=Math.round(c/t*100)+'%';document.getElementById('plbl').textContent=c+'/'+t}
function answerQ(qi,ch){if(answers[qi]!==undefined)return;answers[qi]=ch;if(ch===qs[qi].ans)correct++;render()}
function card(t,l,h,b){var cls='card'+(t==='warn'?' warn':t==='danger'?' danger':t==='ok'?' ok':'');var bd=typeof b==='string'?'<p>'+b+'</p>':'<ul>'+b.map(function(i){return '<li>'+i+'</li>'}).join('')+'</ul>';return '<div class="'+cls+'"><div class="card-lbl">'+l+'</div><h3>'+h+'</h3>'+bd+'</div>'}
function renderReg(){var now=new Date();var ds=now.toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});return '<div class="sec-num">REGISTRATION</div><div class="sec-title">Secure Developer / CI-CD Training</div><div class="sec-desc">NIST SP 800-218 (SSDF) Aligned | AT-3 | 30 Minutes | 80% passing score required</div><div class="reg-box"><label>Full Name</label><input type="text" id="regName" placeholder="e.g. Jane Doe" value="'+userName+'" autocomplete="name"/><label>Date</label><input type="text" value="'+ds+'" readonly/><button class="btn btn-p" style="width:100%" onclick="startTraining()">Begin Training --></button></div>'}
function startTraining(){var n=document.getElementById('regName').value.trim();if(!n){document.getElementById('regName').style.borderColor='var(--red)';return}userName=n;nextStep()}
function renderContent(id){var h='';
if(id==='who'){h+='<div class="sec-num">01 -- SSDF FRAMEWORK</div><div class="sec-title">Who Are Secure Developers &amp; the SSDF</div><div class="sec-desc">NIST SP 800-218 defines the Secure Software Development Framework (SSDF) aligned with Executive Order 14028.</div>';
h+=card('','Target Audience','Who This Training Is For',['<strong>Software Developers:</strong> Write application code, implement business logic, handle data access layers and APIs','<strong>CI/CD Pipeline Engineers:</strong> Build and maintain automated build, test, and deployment pipelines','<strong>Application Developers:</strong> Design user-facing apps, integrate third-party services, manage authentication flows']);
h+=card('warn','SSDF Practice Groups','Four Pillars',['<strong>PO -- Prepare the Organization:</strong> Establish security policies, training, tools, and criteria before development begins','<strong>PS -- Protect the Software:</strong> Protect all code, configs, and artifacts from unauthorized access and tampering','<strong>PW -- Produce Well-Secured Software:</strong> Design and implement software with security built in -- not bolted on','<strong>RV -- Respond to Vulnerabilities:</strong> Identify, analyze, and remediate vulnerabilities throughout the lifecycle']);
}else if(id==='coding'){h+='<div class="sec-num">02 -- SECURE CODING</div><div class="sec-title">Secure Coding Practices &amp; OWASP Top 10</div><div class="sec-desc">Build security in from the start. Every line of code is a potential attack surface.</div>';
h+=card('','Core Practices','Secure by Default',['<strong>Input Validation:</strong> Validate ALL input at trust boundaries. Use allowlists. Never trust user input, APIs, or env vars','<strong>Output Encoding:</strong> HTML-encode for web, parameterize SQL, escape shell commands. Never concatenate untrusted data','<strong>Authentication:</strong> Use proven auth libraries. Secure session tokens (128+ bits), enforce expiry','<strong>Error Handling:</strong> Never expose stack traces. Log detailed errors server-side only. Fail securely -- deny by default','<strong>Secure Defaults:</strong> Ship in most restrictive state. Features opt-in. No debug modes or default credentials in production']);
h+=card('danger','OWASP Top 10','Most Exploited Mistakes',['<strong>A01 Broken Access Control:</strong> Enforce authorization server-side on every request','<strong>A02 Cryptographic Failures:</strong> Use TLS 1.2+, bcrypt/Argon2 for passwords','<strong>A03 Injection:</strong> Parameterized queries and ORMs only','<strong>A05 Security Misconfiguration:</strong> Disable debug endpoints and default accounts','<strong>A06 Vulnerable Components:</strong> SCA tools in CI. Scan on every build','<strong>A09 Security Logging Failures:</strong> Log all auth events and access control failures']);
}else if(id==='secrets'){h+='<div class="sec-num">03 -- SECRETS MANAGEMENT</div><div class="sec-title">Secrets &amp; Credential Handling</div><div class="sec-desc">NEVER hardcode secrets in source code. Secrets committed to version control are compromised -- even after deletion, they persist in git history forever.</div>';
h+=card('','What Counts as a Secret','Protect All of These',['API keys & tokens (AWS, GCP, Azure, GitHub, Stripe...)','Database connection strings and passwords','Private TLS/SSL certificates and private keys','OAuth client secrets and JWT signing keys','SSH private keys and deployment keys','Encryption keys and initialization vectors']);
h+=card('danger','Prohibited Patterns','Never Do This',['Hardcoded credentials in source code (DB_PASS = "P@ssw0rd123")','Secrets in .env files committed to git','API keys in Docker run commands checked into VCS','Base64-encoded secrets -- base64 is NOT encryption']);
h+=card('ok','Required Patterns','Always Do This',['Use secrets managers: HashiCorp Vault, AWS Secrets Manager, Azure Key Vault','Inject secrets at runtime via env vars -- never bake into images or config files','Pre-commit scanning: gitleaks, detect-secrets as hooks to block commits containing secrets','Automate rotation on a schedule. Rotate immediately on any suspected compromise','Remove API keys unused for 90+ days. Review all IAM permissions quarterly']);
}else if(id==='cicd'){h+='<div class="sec-num">04 -- CI/CD PIPELINE SECURITY</div><div class="sec-title">Securing the Build &amp; Deploy Pipeline</div><div class="sec-desc">The CI/CD pipeline is the software supply chain. Compromise at any stage injects malicious code into every downstream deployment.</div>';
h+=card('','Pipeline Principles','Defense in Depth',['<strong>Everything-as-Code:</strong> Pipeline configs must be version-controlled, reviewed, and approved like application code','<strong>Least-Privilege Runners:</strong> CI/CD service accounts must have minimum permissions for each specific job','<strong>Immutable Artifacts:</strong> Signed artifacts must never be modified after build -- what you test is what you deploy','<strong>No Direct Production Access:</strong> All production changes go through the pipeline -- no human direct write access']);
h+=card('warn','Branch Protection &amp; Runners','Pipeline Hardening',['Require PR reviews before merging to main/release branches','Enforce status checks -- CI must pass before merge is allowed','Use ephemeral runners -- fresh, clean environment for every job','Pin runner versions and enable automatic security patch updates','Store all secrets in platform secret stores -- never in pipeline YAML']);
}else if(id==='supply'){h+='<div class="sec-num">05 -- SUPPLY CHAIN &amp; SBOM</div><div class="sec-title">Supply Chain Risk &amp; Software Bill of Materials</div><div class="sec-desc">Modern software is 80-90% third-party code. Every dependency is a potential attack vector. SolarWinds and Log4Shell demonstrated the impact.</div>';
h+=card('danger','Threat Vectors','Know the Attacks',['<strong>Dependency Confusion:</strong> Malicious package with same name as your internal package on a public registry','<strong>Typosquatting:</strong> Packages named to resemble popular libs (e.g. "requets") -- typo installs malware','<strong>Compromised Maintainer:</strong> Legitimate package maintainer hijacked; malicious update pushed to all consumers','<strong>Build Tool Compromise:</strong> CI/CD tooling modified to inject malicious code during build']);
h+=card('ok','Required Mitigations','Protect Your Supply Chain',['Use a private artifact registry (Nexus, Artifactory) -- block direct internet package pulls in CI','Run SCA (Snyk, OWASP Dependency-Check, Grype) on every CI build; block on critical CVEs','Pin all dependencies to exact versions with cryptographic hash verification in lock files','Generate SBOM in CycloneDX or SPDX format on every release -- required by EO 14028','Pin CI/CD actions to commit SHAs -- not mutable version tags']);
}
h+='<div class="nav"><div class="dots">'+dots()+'</div><button class="btn btn-p" onclick="nextStep()">'+(id==='supply'?'Start Quiz -->':'Continue -->')+'</button></div>';return h}
function renderQuiz(qi){var q=qs[qi];var a=answers[qi]!==undefined;var h='<div class="sec-num">KNOWLEDGE CHECK</div><div class="sec-title">Quiz</div><div class="quiz-box"><div class="q-counter">QUESTION '+(qi+1)+' / '+qs.length+'</div><div class="q-text">'+q.q+'</div><div class="options">';var L=['A','B','C','D'];q.opts.forEach(function(o,i){var c='opt';if(a){c+=' off';if(i===q.ans)c+=' correct';else if(i===answers[qi])c+=' wrong'}h+='<button class="'+c+'" onclick="answerQ('+qi+','+i+')"><span class="opt-letter">'+L[i]+'</span><span>'+o+'</span></button>'});h+='</div>';var ok=a&&answers[qi]===q.ans;h+='<div class="feedback'+(a?' show':'')+(a&&!ok?' bad':'')+'">'+(a?(ok?'+ ':'x ')+q.fb:'')+'</div></div>';h+='<div class="nav"><div class="dots">'+dots()+'</div><button class="btn btn-p" '+(a?'':'disabled')+' onclick="nextStep()">'+(qi===qs.length-1?'Finish -->':'Next -->')+'</button></div>';return h}
function genHash(s){var h=5381;for(var i=0;i<s.length;i++)h=((h<<5)+h)+s.charCodeAt(i);return 'XAI-DEV-'+('000000'+Math.abs(h).toString(16).toUpperCase()).slice(-6)}
function submitCompletion(hash,pct,ds){window.open(FORM_URL+'?usp=pp_url&'+FIELD_NAME+'='+encodeURIComponent(userName)+'&'+FIELD_DATE+'='+encodeURIComponent(ds)+'&'+FIELD_COURSE+'='+encodeURIComponent(COURSE_NAME)+'&'+FIELD_SCORE+'='+encodeURIComponent(pct+'%')+'&'+FIELD_HASH+'='+encodeURIComponent(hash),'_blank')}
function renderDone(){var pct=Math.round(correct/qs.length*100);var passed=pct>=80;var now=new Date();var ds=now.toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});var h='<div class="done-wrap">';if(passed){h+='<div class="done-icon">&#x1f6e1;</div><h2>Congratulations, '+userName+'!</h2><p>You have successfully completed Secure Developer / CI-CD Training aligned to NIST SP 800-218 (SSDF).</p>'}else{h+='<div class="done-icon">&#x1f4cb;</div><h2>Review Recommended</h2><p>'+userName+', you scored below 80%. Review the content and retake when ready.</p>'}h+='<div class="score '+(passed?'pass':'fail')+'">'+pct+'%</div><p style="font-family:var(--mono);font-size:11px;color:var(--dim)">'+correct+' / '+qs.length+' CORRECT</p>';if(passed){var hash=genHash(userName+ds+pct+correct);h+='<div class="cert"><div class="cert-lbl">AT-3 Training Completion Record</div><div class="cert-row">Name: <span>'+userName+'</span></div><div class="cert-row">Course: <span>Secure Developer / CI-CD (AT-3 / SSDF)</span></div><div class="cert-row">Framework: <span>NIST SP 800-218 / EO 14028</span></div><div class="cert-row">Score: <span>'+pct+'% ('+correct+'/'+qs.length+')</span></div><div class="cert-row">Date: <span>'+ds+'</span></div><div class="cert-row">Completion ID: <span style="color:var(--accent);letter-spacing:.08em">'+hash+'</span></div><div class="cert-row">Topics: <span>SSDF, Secure Coding, OWASP, Secrets Mgmt, CI/CD Security, Supply Chain, SBOM</span></div></div><br/><button class="btn btn-p" onclick="submitCompletion(\''+hash+'\','+pct+',\''+ds+'\')">Submit Completion Record</button>&nbsp;&nbsp;'}h+='<br/><br/><button class="btn '+(passed?'btn-g':'btn-p')+'" onclick="restart()">Retake</button></div>';return h}
function render(){var s=steps[step];var h='';if(s.type==='reg')h=renderReg();else if(s.type==='c')h=renderContent(s.id);else if(s.type==='q')h=renderQuiz(s.id);else h=renderDone();document.getElementById('root').innerHTML=h;updateProg()}
function restart(){step=0;answers={};correct=0;render();window.scrollTo(0,0)}
render();
</script></body></html>
