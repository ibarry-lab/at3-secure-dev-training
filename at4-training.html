ground:var(--green)}.card-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}.card.warn .card-lbl{color:var(--yellow)}.card.danger .card-lbl{color:var(--red)}.card.ok .card-lbl{color:var(--green)}.card h3{font-size:14px;font-weight:600;color:#fff;margin-bottom:8px}.card p,.card li{font-size:13px;color:var(--text);line-height:1.65}.card ul{list-style:none;padding:0}.card ul li{padding:4px 0 4px 14px;position:relative}.card ul li::before{content:'>';position:absolute;left:0;color:var(--accent);font-weight:700}.quiz-box{background:var(--surface);border:1px solid var(--border);padding:24px 20px;position:relative}.quiz-box::before{content:'';position:absolute;top:0;left:0;width:100%;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2))}.q-counter{font-family:var(--mono);font-size:10px;color:var(--dim);margin-bottom:12px}.q-text{font-size:15px;font-weight:600;color:#fff;line-height:1.5;margin-bottom:20px}.options{display:flex;flex-direction:column;gap:8px}.opt{background:var(--surface2);border:1px solid var(--border);padding:12px 14px;cursor:pointer;display:flex;gap:10px;align-items:flex-start;font-size:13px;color:var(--text);text-align:left;width:100%;transition:border-color .15s}.opt:hover{border-color:var(--accent);color:#fff}.opt.correct{border-color:var(--green);background:rgba(0,255,159,.05);color:var(--green)}.opt.wrong{border-color:var(--red);background:rgba(255,71,87,.05);color:var(--red)}.opt.off{cursor:default;pointer-events:none}.opt-letter{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--accent);min-width:16px;padding-top:1px}.opt.correct .opt-letter{color:var(--green)}.opt.wrong .opt-letter{color:var(--red)}.feedback{margin-top:16px;padding:13px 14px;border-left:3px solid var(--green);font-size:13px;color:var(--text);line-height:1.6;display:none}.feedback.show{display:block}.feedback.bad{border-color:var(--red)}.feedback strong{color:#fff}.nav{display:flex;align-items:center;justify-content:space-between;margin-top:28px}.dots{display:flex;gap:5px;flex-wrap:wrap}.dot{width:6px;height:6px;border-radius:50%;background:var(--border)}.dot.active{background:var(--accent);box-shadow:0 0 5px var(--accent)}.dot.done{background:var(--green)}.btn{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:10px 20px;border:1px solid;cursor:pointer;background:transparent;transition:all .15s}.btn-p{border-color:var(--accent);color:var(--accent)}.btn-p:hover{background:var(--accent);color:var(--bg)}.btn-p:disabled{opacity:.3;cursor:default;pointer-events:none}.btn-g{border-color:var(--border);color:var(--dim)}.btn-g:hover{border-color:var(--dim);color:var(--text)}.done-wrap{text-align:center;padding:48px 0}.done-icon{font-size:44px;margin-bottom:16px}.done-wrap h2{font-size:24px;font-weight:700;color:#fff;margin-bottom:8px}.done-wrap p{font-size:13px;color:var(--dim);max-width:460px;margin:0 auto 24px;line-height:1.6}.score{font-family:var(--mono);font-size:44px;font-weight:600;text-shadow:0 0 24px rgba(0,255,159,.4);margin:16px 0 4px}.score.pass{color:var(--green)}.score.fail{color:var(--red)}.cert{border:1px solid var(--border);background:var(--surface);padding:20px 24px;display:inline-block;text-align:left;margin-top:20px;max-width:440px;width:100%}.cert-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:var(--accent);margin-bottom:12px;text-transform:uppercase}.cert-row{font-family:var(--mono);font-size:11px;color:var(--dim);margin-bottom:4px}.cert-row span{color:var(--text)}.reg-box{background:var(--surface);border:1px solid var(--border);padding:32px 28px;max-width:420px;margin:0 auto}.reg-box label{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--dim);text-transform:uppercase;margin-bottom:6px}.reg-box input{width:100%;background:var(--surface2);border:1px solid var(--border);color:#fff;font-family:var(--sans);font-size:14px;padding:10px 12px;margin-bottom:20px;outline:none;transition:border-color .15s}.reg-box input:focus{border-color:var(--accent)}.reg-box input[readonly]{color:var(--dim);cursor:default}</style>

var FIELD_NAME='entry.1084561241',FIELD_DATE='entry.989191631',FIELD_COURSE='entry.1455054579',FIELD_SCORE='entry.766034301',FIELD_HASH='entry.1157983501';
var COURSE_NAME='Training Records & Tracking (AT-4)';
var step=0,answers={},correct=0,userName='';
var steps=[{type:'reg'},{type:'c',id:'what'},{type:'c',id:'data'},{type:'c',id:'roles'},{type:'c',id:'monitor'},{type:'c',id:'audit'},
{type:'q',id:0},{type:'q',id:1},{type:'q',id:2},{type:'q',id:3},{type:'q',id:4},{type:'q',id:5},{type:'q',id:6},{type:'q',id:7},{type:'q',id:8},{type:'q',id:9},{type:'done'}];
var qs=[
{q:'What are the two core requirements of NIST SP 800-53 AT-4?',opts:['Assign training to all users and send reminder emails','Document and monitor information security training activities, and retain individual training records for a defined period','Complete annual security awareness training and role-based training for privileged users','Report training completion rates to the CIO monthly'],ans:1,fb:'<strong>Correct.</strong> AT-4 has two explicit requirements: (a) document and monitor training activities, and (b) retain individual records for an organization-defined period.'},
{q:'A contractor who left 18 months ago has no training records -- they were deleted at separation. Your retention policy requires 3 years. What is the assessment outcome?',opts:['The assessor will accept a supervisor affidavit','This is a finding -- records must be retained through the full retention window regardless of employment status','Contractors are not covered by AT-4','The assessor will waive it since the individual is gone'],ans:1,fb:'<strong>Correct.</strong> AT-4 requires retention through the defined period regardless of employment status. Deleting records at separation is a common deficiency that results in an AT-4 finding. Contractors ARE covered.'},
{q:'A user is promoted from standard user to system administrator. What AT-4 action is required?',opts:['No action -- existing awareness training is sufficient','Complete privileged user training at the next annual cycle','The role change must trigger assignment of role-specific privileged user training, completed before or promptly after access change','Note the role change at the next quarterly review'],ans:2,fb:'<strong>Correct.</strong> Role changes must trigger updated training assignments. Delaying until the next annual cycle leaves the user with privileged access but without required training.'},
{q:'Which of the following BEST satisfies AT-4 evidence for a completed training event?',opts:['A supervisor email confirming the employee attended a briefing','A spreadsheet entry showing "Complete" next to the employee name','A system-generated or certificate record showing individual name, course title, completion date, and pass status','A department-level report showing 95% team completion'],ans:2,fb:'<strong>Correct.</strong> AT-4 requires individual-level records with specific data elements. Supervisor emails, spreadsheet checkboxes, and aggregate percentages are insufficient.'},
{q:'AT-4 specifies that training records must be retained for how long?',opts:['Exactly 3 years -- the NIST-mandated federal standard','1 year -- covering the current training cycle only','An organization-defined time period documented in the AT-1 policy','Indefinitely -- all records must be maintained permanently'],ans:2,fb:'<strong>Correct.</strong> AT-4 does not specify a fixed period -- the organization defines it in policy (typically AT-1). Most agencies adopt 3 years minimum based on FISMA/NARA guidance.'},
{q:'Your training system shows 92% completion for annual security awareness training. Is this AT-4 compliant?',opts:['92% is acceptable -- NIST allows for a small percentage of non-completion','AT-4 requires 100% completion for all users with system access. The 8% who have not completed represent a finding','92% is sufficient as long as non-compliant users are executives','The organization is compliant because the majority completed'],ans:1,fb:'<strong>Correct.</strong> AT-4 does not recognize a passing percentage threshold. Every individual with system access must have a current record. The 8% are gaps that must be tracked and escalated.'},
{q:'What is the primary difference between AT-2, AT-3, and AT-4?',opts:['AT-2 is for managers, AT-3 for technical staff, AT-4 for executives','AT-2 covers general awareness training for all users, AT-3 covers role-based training for security roles, and AT-4 covers the documentation and monitoring of both','AT-2 is mandatory, AT-3 and AT-4 are optional for high-impact systems only','AT-2 and AT-3 apply to employees while AT-4 applies only to contractors'],ans:1,fb:'<strong>Correct.</strong> AT-2 = general awareness for all users. AT-3 = role-based for security roles. AT-4 = the record-keeping control that proves AT-2 and AT-3 are being implemented.'},
{q:'15 users have training expiring in the next 30 days. What does AT-4 monitoring require?',opts:['File the report and review at the next quarterly meeting','Notify only supervisors -- users don\'t need to be contacted','Send automated reminders to the 15 users and their supervisors immediately, track responses, and escalate any who haven\'t completed by expiration','Archive the report as evidence of monitoring -- no further action until expiration'],ans:2,fb:'<strong>Correct.</strong> AT-4 requires active monitoring -- not passive observation. Best practice: automated reminders at 30/14/7 days to both individuals and supervisors, with escalation tracking.'},
{q:'12 contractors with active system access are not in the training tracking system at all. What is this?',opts:['A configuration management issue for the next sprint','A population coverage gap -- a direct AT-4 finding. Contractors must be added immediately, assigned training, and access reviewed','Out of scope -- contractors are managed by the contracting office','Acceptable -- contractors are covered by their employers\' training programs'],ans:1,fb:'<strong>Correct.</strong> AT-4 explicitly covers all individuals with system access including contractors. Missing contractors are a population coverage gap -- one of the most common AT-4 findings.'},
{q:'What is the MOST important step an ISSO should take 30 days before a FISMA assessment to prepare AT-4 evidence?',opts:['Create new certificates for missing completions','Brief the assessment team on the organization\'s training philosophy','Reconcile the training system population against the current HR and contractor roster, resolve all gaps and overdue training, and prepare exportable individual records','Archive older records to prevent assessors from finding expired entries'],ans:2,fb:'<strong>Correct.</strong> Population reconciliation is the most critical pre-assessment action. Coverage gaps discovered by assessors are worse than those discovered and remediated by the ISSO. Creating retroactive certificates or hiding records are prohibited actions.'}
];
function dots(){var v=steps.filter(function(s){return s.type!=='done'&&s.type!=='reg'});return v.map(function(s){var idx=steps.indexOf(s);var c='dot';if(idx<step)c+=' done';else if(idx===step)c+=' active';return '<div class="'+c+'"></div>'}).join('')}
function nextStep(){if(step<steps.length-1){step++;render();window.scrollTo(0,0)}}
function updateProg(){var t=steps.filter(function(s){return s.type!=='done'&&s.type!=='reg'}).length;var c=Math.max(0,step-1);document.getElementById('pbar').style.width=Math.round(c/t*100)+'%';document.getElementById('plbl').textContent=c+'/'+t}
function answerQ(qi,ch){if(answers[qi]!==undefined)return;answers[qi]=ch;if(ch===qs[qi].ans)correct++;render()}
function card(t,l,h,b){var cls='card'+(t==='warn'?' warn':t==='danger'?' danger':t==='ok'?' ok':'');var bd=typeof b==='string'?'<p>'+b+'</p>':'<ul>'+b.map(function(i){return '<li>'+i+'</li>'}).join('')+'</ul>';return '<div class="'+cls+'"><div class="card-lbl">'+l+'</div><h3>'+h+'</h3>'+bd+'</div>'}
function renderReg(){var now=new Date();var ds=now.toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});return '<div class="sec-num">REGISTRATION</div><div class="sec-title">Training Records &amp; Tracking (AT-4)</div><div class="sec-desc">NIST SP 800-53 AT-4 | 30 Minutes | 80% passing score required</div><div class="reg-box"><label>Full Name</label><input type="text" id="regName" placeholder="e.g. Jane Doe" value="'+userName+'" autocomplete="name"/><label>Date</label><input type="text" value="'+ds+'" readonly/><button class="btn btn-p" style="width:100%" onclick="startTraining()">Begin Training --></button></div>'}
function startTraining(){var n=document.getElementById('regName').value.trim();if(!n){document.getElementById('regName').style.borderColor='var(--red)';return}userName=n;nextStep()}
function renderContent(id){var h='';
if(id==='what'){h+='<div class="sec-num">01 -- WHAT IS AT-4</div><div class="sec-title">Training Records Requirements</div><div class="sec-desc">AT-4 requires organizations to document and monitor information security training activities and retain individual training records for a defined period.</div>';
h+=card('','AT Control Family','How AT-4 Fits',['<strong>AT-1 Policy & Procedures:</strong> Establishes the overarching training policy that AT-4 records must reflect','<strong>AT-2 Literacy Training:</strong> General security awareness for ALL users. AT-4 documents completion for every individual.','<strong>AT-3 Role-Based Training:</strong> Specialized training for privileged users, developers, IR teams. AT-4 tracks role-specific completion.','<strong>AT-4 Training Records:</strong> Documents and monitors all training from AT-2 and AT-3. The record-keeping spine of the entire AT family.']);
h+=card('danger','Why Records Matter','Undocumented = No Training',['Undocumented training is treated the same as no training during an assessment','Missing records result in FISMA non-compliance findings and may delay ATO','OIG audits routinely cite incomplete training records as a material weakness','If a security incident occurs and the involved user lacks training records, organizational liability is significantly increased','AT-4 is assessed in every FISMA evaluation']);
}else if(id==='data'){h+='<div class="sec-num">02 -- REQUIRED DATA &amp; CATEGORIES</div><div class="sec-title">What Must Be Tracked</div><div class="sec-desc">AT-4 requires documentation of all security training activities. These data elements must be recorded for every training event for every individual.</div>';
h+=card('','Mandatory Record Fields','Per-Person, Per-Course',['<strong>Individual Identity:</strong> Full name, employee/contractor ID, and organizational unit','<strong>Course Name & ID:</strong> Official course title and unique identifier','<strong>Training Type:</strong> Awareness (AT-2) or role-based (AT-3) with specific role identified','<strong>Completion Date:</strong> Exact date completed -- not assigned, not started','<strong>Expiration / Due Date:</strong> Date by which re-completion is required','<strong>Delivery Method:</strong> eLearning, classroom, webinar, on-the-job','<strong>Score / Pass Status:</strong> Assessment score and pass/fail determination','<strong>Certificate / Evidence:</strong> Completion certificate or system record attached']);
h+=card('warn','Training Categories Requiring Records','All Types',['<strong>Security Awareness (AT-2):</strong> Annual, all users with system access','<strong>Privileged User (AT-3):</strong> Annual, sysadmins, DBAs, network engineers','<strong>Incident Response (IR-2):</strong> Annual, IR team, SOC personnel','<strong>Contingency Planning (CP-3):</strong> Annual, DR team, backup admins','<strong>Supply Chain (SR-11):</strong> Annual, procurement, maintenance, QA','<strong>Role-Specific:</strong> As assigned, based on role and system access']);
}else if(id==='roles'){h+='<div class="sec-num">03 -- ROLES &amp; RETENTION</div><div class="sec-title">Responsibilities &amp; Record Retention</div><div class="sec-desc">AT-4 distributes responsibility across the organization. Clear role assignments prevent gaps.</div>';
h+=card('','ISSO / ISSM','Control Owner',['Owns AT-4 and is accountable for implementation','Reviews training completion reports monthly and before every assessment','Escalates chronic non-compliance to CISO and program management','Signs off on training record completeness as part of ATO package']);
h+=card('warn','Training Coordinator','Day-to-Day Operations',['Administers the training tracking system','Assigns required training based on role and system access','Sends automated reminders at 30, 14, and 7 days before expiration','Produces weekly compliance status reports for ISSO review']);
h+=card('','Supervisors &amp; Individuals','Shared Accountability',['<strong>Supervisors:</strong> Ensure direct reports complete training on time; escalate non-compliance; notify of role changes','<strong>Individuals:</strong> Complete assigned training by due date; maintain copies of completion certificates; notify if assignments appear incorrect']);
h+=card('ok','Retention Policy','How Long to Keep Records',['NIST AT-4 does not specify an exact period -- it must be organization-defined in policy','FISMA / OMB A-130: 3 years minimum','DFARS / CMMC: 3 years','HIPAA: 6 years','Best practice: life of employee + 3 years after separation','Do NOT delete records on the date of separation -- retain through the full window']);
}else if(id==='monitor'){h+='<div class="sec-num">04 -- MONITORING &amp; REPORTING</div><div class="sec-title">Active Monitoring Requirements</div><div class="sec-desc">AT-4 requires both documentation AND monitoring -- simply storing records is not enough. The organization must actively track compliance status.</div>';
h+=card('','Required Monitoring','Active Tracking',['<strong>Completion Rate:</strong> Real-time visibility into completion percentage. 100% is the required target.','<strong>Expiration Monitoring:</strong> Automated alerts at 30, 14, and 7 days pre-expiration. Flag overdue immediately.','<strong>New User Onboarding:</strong> Track completion for new employees/contractors. No system access before initial training.','<strong>Role Change Tracking:</strong> Role changes must automatically assign new role-based training requirements.']);
h+=card('warn','Reporting Cadence','Who Gets What, When',['<strong>Weekly:</strong> Training Coordinator to ISSO -- overdue list, new completions, upcoming expirations','<strong>Monthly:</strong> ISSO to CISO/PM -- organization-wide completion rates by training type','<strong>Quarterly:</strong> CISO to Leadership/CIO -- trend analysis, chronic non-compliers','<strong>Annually:</strong> ISSO to Assessor/AO -- full AT-4 evidence package','<strong>On Demand:</strong> Individual or aggregate records exportable within 24 hours of request']);
}else if(id==='audit'){h+='<div class="sec-num">05 -- AUDIT READINESS &amp; COMMON DEFICIENCIES</div><div class="sec-title">Assessment Preparation &amp; Pitfalls</div><div class="sec-desc">Know what assessors need and have it ready before they ask. These are the most frequently cited AT-4 findings.</div>';
h+=card('','Evidence Assessors Will Request','Be Ready',['AT-1 policy document showing defined retention period and training frequency','Complete list of ALL users required to complete AT-2 and AT-3 training','Individual training records for each person on the required population list','Completion certificates or system-generated evidence for each completion','Records for separated employees within the retention window','Metrics showing current completion rate and trending over time']);
h+=card('danger','Common Deficiencies','Avoid These Findings',['<strong>Incomplete Population:</strong> Not all users with system access are in the tracking system. Cross-reference with HR monthly.','<strong>Contractors Missing:</strong> AT-4 explicitly covers contractors. Track in the same system as employees.','<strong>No Evidence:</strong> A spreadsheet checkbox is not evidence. Each completion needs a dated certificate or system record.','<strong>Expired Records Not Flagged:</strong> Training expired = training not complete. Enable automated alerts.','<strong>Separated Employee Records Deleted:</strong> Retain through full retention window regardless of employment status.','<strong>Role Changes Not Triggering Training:</strong> Integrate HR role-change workflows with the training system.','<strong>No Defined Retention Period:</strong> AT-1 policy must specify a retention period or AT-4 cannot be satisfied.','<strong>Records Not Producible in 24 Hours:</strong> Test your export capability before every assessment.']);
}
h+='<div class="nav"><div class="dots">'+dots()+'</div><button class="btn btn-p" onclick="nextStep()">'+(id==='audit'?'Start Quiz -->':'Continue -->')+'</button></div>';return h}
function renderQuiz(qi){var q=qs[qi];var a=answers[qi]!==undefined;var h='<div class="sec-num">KNOWLEDGE CHECK</div><div class="sec-title">Quiz</div><div class="quiz-box"><div class="q-counter">QUESTION '+(qi+1)+' / '+qs.length+'</div><div class="q-text">'+q.q+'</div><div class="options">';var L=['A','B','C','D'];q.opts.forEach(function(o,i){var c='opt';if(a){c+=' off';if(i===q.ans)c+=' correct';else if(i===answers[qi])c+=' wrong'}h+='<button class="'+c+'" onclick="answerQ('+qi+','+i+')"><span class="opt-letter">'+L[i]+'</span><span>'+o+'</span></button>'});h+='</div>';var ok=a&&answers[qi]===q.ans;h+='<div class="feedback'+(a?' show':'')+(a&&!ok?' bad':'')+'">'+(a?(ok?'+ ':'x ')+q.fb:'')+'</div></div>';h+='<div class="nav"><div class="dots">'+dots()+'</div><button class="btn btn-p" '+(a?'':'disabled')+' onclick="nextStep()">'+(qi===qs.length-1?'Finish -->':'Next -->')+'</button></div>';return h}
function genHash(s){var h=5381;for(var i=0;i<s.length;i++)h=((h<<5)+h)+s.charCodeAt(i);return 'XAI-AT4-'+('000000'+Math.abs(h).toString(16).toUpperCase()).slice(-6)}
function submitCompletion(hash,pct,ds){window.open(FORM_URL+'?usp=pp_url&'+FIELD_NAME+'='+encodeURIComponent(userName)+'&'+FIELD_DATE+'='+encodeURIComponent(ds)+'&'+FIELD_COURSE+'='+encodeURIComponent(COURSE_NAME)+'&'+FIELD_SCORE+'='+encodeURIComponent(pct+'%')+'&'+FIELD_HASH+'='+encodeURIComponent(hash),'_blank')}
function renderDone(){var pct=Math.round(correct/qs.length*100);var passed=pct>=80;var now=new Date();var ds=now.toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});var h='<div class="done-wrap">';if(passed){h+='<div class="done-icon">&#x1f6e1;</div><h2>Congratulations, '+userName+'!</h2><p>You have successfully completed Training Records & Tracking (AT-4) training for NIST SP 800-53.</p>'}else{h+='<div class="done-icon">&#x1f4cb;</div><h2>Review Recommended</h2><p>'+userName+', you scored below 80%. Review the content and retake when ready.</p>'}h+='<div class="score '+(passed?'pass':'fail')+'">'+pct+'%</div><p style="font-family:var(--mono);font-size:11px;color:var(--dim)">'+correct+' / '+qs.length+' CORRECT</p>';if(passed){var hash=genHash(userName+ds+pct+correct);h+='<div class="cert"><div class="cert-lbl">AT-4 Training Completion Record</div><div class="cert-row">Name: <span>'+userName+'</span></div><div class="cert-row">Course: <span>Training Records & Tracking (AT-4)</span></div><div class="cert-row">Framework: <span>NIST SP 800-53 / FISMA / RMF</span></div><div class="cert-row">Score: <span>'+pct+'% ('+correct+'/'+qs.length+')</span></div><div class="cert-row">Date: <span>'+ds+'</span></div><div class="cert-row">Completion ID: <span style="color:var(--accent);letter-spacing:.08em">'+hash+'</span></div><div class="cert-row">Topics: <span>AT-4 Requirements, Record Elements, Retention, Monitoring, Reporting, Audit Readiness</span></div></div><br/><button class="btn btn-p" onclick="submitCompletion(\''+hash+'\','+pct+',\''+ds+'\')">Submit Completion Record</button>&nbsp;&nbsp;'}h+='<br/><br/><button class="btn '+(passed?'btn-g':'btn-p')+'" onclick="restart()">Retake</button></div>';return h}
function render(){var s=steps[step];var h='';if(s.type==='reg')h=renderReg();else if(s.type==='c')h=renderContent(s.id);else if(s.type==='q')h=renderQuiz(s.id);else h=renderDone();document.getElementById('root').innerHTML=h;updateProg()}
function restart(){step=0;answers={};correct=0;render();window.scrollTo(0,0)}
render();
</script></body></html>
