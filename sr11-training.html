-align:left;width:100%;transition:border-color .15s}.opt:hover{border-color:var(--accent);color:#fff}.opt.correct{border-color:var(--green);background:rgba(0,255,159,.05);color:var(--green)}.opt.wrong{border-color:var(--red);background:rgba(255,71,87,.05);color:var(--red)}.opt.off{cursor:default;pointer-events:none}.opt-letter{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--accent);min-width:16px;padding-top:1px}.opt.correct .opt-letter{color:var(--green)}.opt.wrong .opt-letter{color:var(--red)}.feedback{margin-top:16px;padding:13px 14px;border-left:3px solid var(--green);font-size:13px;color:var(--text);line-height:1.6;display:none}.feedback.show{display:block}.feedback.bad{border-color:var(--red)}.feedback strong{color:#fff}.nav{display:flex;align-items:center;justify-content:space-between;margin-top:28px}.dots{display:flex;gap:5px;flex-wrap:wrap}.dot{width:6px;height:6px;border-radius:50%;background:var(--border)}.dot.active{background:var(--accent);box-shadow:0 0 5px var(--accent)}.dot.done{background:var(--green)}.btn{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:10px 20px;border:1px solid;cursor:pointer;background:transparent;transition:all .15s}.btn-p{border-color:var(--accent);color:var(--accent)}.btn-p:hover{background:var(--accent);color:var(--bg)}.btn-p:disabled{opacity:.3;cursor:default;pointer-events:none}.btn-g{border-color:var(--border);color:var(--dim)}.btn-g:hover{border-color:var(--dim);color:var(--text)}.done-wrap{text-align:center;padding:48px 0}.done-icon{font-size:44px;margin-bottom:16px}.done-wrap h2{font-size:24px;font-weight:700;color:#fff;margin-bottom:8px}.done-wrap p{font-size:13px;color:var(--dim);max-width:460px;margin:0 auto 24px;line-height:1.6}.score{font-family:var(--mono);font-size:44px;font-weight:600;text-shadow:0 0 24px rgba(0,255,159,.4);margin:16px 0 4px}.score.pass{color:var(--green)}.score.fail{color:var(--red)}.cert{border:1px solid var(--border);background:var(--surface);padding:20px 24px;display:inline-block;text-align:left;margin-top:20px;max-width:440px;width:100%}.cert-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:var(--accent);margin-bottom:12px;text-transform:uppercase}.cert-row{font-family:var(--mono);font-size:11px;color:var(--dim);margin-bottom:4px}.cert-row span{color:var(--text)}.reg-box{background:var(--surface);border:1px solid var(--border);padding:32px 28px;max-width:420px;margin:0 auto}.reg-box label{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--dim);text-transform:uppercase;margin-bottom:6px}.reg-box input{width:100%;background:var(--surface2);border:1px solid var(--border);color:#fff;font-family:var(--sans);font-size:14px;padding:10px 12px;margin-bottom:20px;outline:none;transition:border-color .15s}.reg-box input:focus{border-color:var(--accent)}.reg-box input[readonly]{color:var(--dim);cursor:default}

var FORM_URL='https://docs.google.com/forms/d/e/1FAIpQLSdHsEWs-iPTGncIBdIiFGaEnxl6MXMN6IHFnUVDGyG1Trf4fw/viewform';
var FIELD_NAME='entry.1084561241',FIELD_DATE='entry.989191631',FIELD_COURSE='entry.1455054579',FIELD_SCORE='entry.766034301',FIELD_HASH='entry.1157983501';
var COURSE_NAME='Supply Chain / Anti-Counterfeit Training (SR-11)';
var step=0,answers={},correct=0,userName='';
var steps=[{type:'reg'},{type:'c',id:'overview'},{type:'c',id:'threat'},{type:'c',id:'legal'},{type:'c',id:'inspect'},{type:'c',id:'report'},
{type:'q',id:0},{type:'q',id:1},{type:'q',id:2},{type:'q',id:3},{type:'q',id:4},{type:'q',id:5},{type:'q',id:6},{type:'q',id:7},{type:'q',id:8},{type:'q',id:9},{type:'q',id:10},{type:'q',id:11},{type:'done'}];
var qs=[
{q:'Which of the following BEST defines a counterfeit electronic part under DFARS 252.246-7008?',opts:['Any part purchased from a non-U.S. supplier that has not been tested','An unlawful reproduction, substitution, or alteration of a genuine part that misrepresents its identity, origin, performance, or conformance','Any part that fails incoming inspection regardless of source','A part that is out of date code by more than 24 months'],ans:1,fb:'<strong>Correct.</strong> DFARS 252.246-7008 defines a counterfeit part as an unlawful or unauthorized reproduction, substitution, or alteration that misrepresents the part\'s identity, origin, material, performance, or conformance.'},
{q:'A procurement specialist is sourcing a critical component. The OEM is backordered. A broker on an online marketplace offers parts at a steep discount. What is the correct action?',opts:['Purchase from the online broker since the OEM cannot supply the parts','Purchase from the broker and perform visual inspection upon receipt','Do not purchase from the unauthorized source; document the backorder and pursue authorized alternatives or request program office guidance','Purchase from the broker and test 10% of the lot'],ans:2,fb:'<strong>Correct.</strong> Online marketplaces are prohibited sources for covered defense parts. An OEM backorder does not authorize use of unauthorized sources. Pursue other authorized distributors or request a program office waiver.'},
{q:'Under NDAA Section 818 and DFARS, within how many days of discovering a suspect counterfeit part must a contractor submit a GIDEP report?',opts:['24 hours','30 days','60 days','90 days'],ans:2,fb:'<strong>Correct.</strong> DFARS 252.246-7008 requires reporting suspect counterfeit parts to GIDEP within 60 days of discovery. Internal reporting to QA and the Contracting Officer must occur before or concurrent with GIDEP.'},
{q:'A maintenance technician notices grinding marks and lot codes applied over residue on replacement capacitors. What should she do?',opts:['Install the parts -- cosmetic variations are common','Test the parts electrically before installation','Immediately quarantine the entire lot, label them SUSPECT COUNTERFEIT, and notify Quality Assurance on the same day','Return the parts to the supplier with a complaint'],ans:2,fb:'<strong>Correct.</strong> Grinding marks and remarking residue are classic counterfeit indicators. A single indicator is sufficient cause to quarantine. Do NOT install, return to supplier, or discard.'},
{q:'Which type of counterfeit part involves genuine components recovered from electronic waste and resold as new?',opts:['Cloned / copied parts','Out-of-spec parts','Recycled / salvaged parts','Overproduced parts'],ans:2,fb:'<strong>Correct.</strong> Recycled/salvaged parts are recovered from e-waste and resold as new. They may appear functional initially but have depleted operational life and unpredictable failure modes.'},
{q:'Your organization needs parts from an independent (non-franchised) distributor due to a 12-week OEM lead time. Which risk mitigation is REQUIRED by DFARS?',opts:['No additional measures are required if lead times make authorized sources impractical','Documented risk mitigation including inspection and testing, plus documentation explaining why authorized sources were not used','Purchasing in small quantities reduces risk sufficiently','A verbal confirmation from the distributor that parts are genuine'],ans:1,fb:'<strong>Correct.</strong> DFARS allows non-franchised distributors only with documented risk mitigation including incoming inspection/testing proportionate to risk, plus documentation explaining why an authorized source was not used.'},
{q:'What does "traceability" mean in the context of anti-counterfeit requirements?',opts:['The ability to track a part\'s physical location in a warehouse','The ability to trace a component from its current location back to the original manufacturer through an unbroken, documented chain of custody','The ability to determine remaining useful life based on manufacture date','A software feature that flags parts ordered from overseas'],ans:1,fb:'<strong>Correct.</strong> Traceability means an unbroken documented chain of custody from the OEM to the current location, documented through purchase orders, shipping records, and certificates of conformance/authenticity.'},
{q:'X-ray inspection reveals a die size and bond wire configuration inconsistent with known-authentic reference images. What does this indicate?',opts:['Parts were likely damaged during shipping','X-ray results are not reliable for counterfeit detection','The parts are suspect counterfeit -- the internal die is inconsistent with the genuine design','The parts should be retested with a different X-ray machine'],ans:2,fb:'<strong>Correct.</strong> X-ray inspection detects cloned and remarked parts by revealing internal die structure. Inconsistency with known-authentic references is a strong counterfeit indicator requiring immediate quarantine and GIDEP reporting.'},
{q:'How long must inspection, testing, and procurement records for electronic parts be retained under DFARS 252.246-7007?',opts:['1 year from installation','3 years from procurement','Minimum 6 years; life-of-system plus 6 years for safety-critical applications','Until the program ends'],ans:2,fb:'<strong>Correct.</strong> DFARS requires minimum 6-year retention. For safety-critical or long-life systems, best practice extends to life of system plus 6 years. Suspect counterfeit records should be retained indefinitely until disposition is closed.'},
{q:'What is the CORRECT disposition for parts confirmed as suspect counterfeit?',opts:['Return to the supplier and request a credit','Scrap the parts immediately to prevent use','Quarantine, label, report to QA and GIDEP, notify the Contracting Officer, and determine disposition with QA and legal -- do not return or scrap without authorization','Test remaining parts -- any that pass can be released to service'],ans:2,fb:'<strong>Correct.</strong> Never return suspect parts to the supplier (destroys evidence, enables re-entry to supply chain), scrap without authorization, or return to service. Quarantine, report, and coordinate disposition with QA, legal, and the Contracting Officer.'},
{q:'How should you MOST reliably verify a new supplier\'s claim of being an authorized franchised distributor?',opts:['Accept the supplier\'s own certificate or letter','Search the manufacturer\'s official website or contact the manufacturer directly to verify authorization','Purchase a sample lot and test it','Check the supplier\'s LinkedIn profile and website'],ans:1,fb:'<strong>Correct.</strong> Contact the OEM directly or check their official authorized distributor list. Supplier-provided letters can be forged. Sample testing proves the sample is authentic but not the supplier\'s ongoing authorization.'},
{q:'What is GIDEP and why is contractor participation important?',opts:['A government insurance program that reimburses contractors for counterfeit losses','The Government-Industry Data Exchange Program -- a database where organizations share failure and suspect counterfeit reports, enabling the broader defense community to avoid compromised components','An export control registration system','A voluntary quality certification program'],ans:1,fb:'<strong>Correct.</strong> GIDEP is a cooperative database where government agencies and defense contractors share suspect counterfeit alerts. Your report enables every other participating organization to identify and reject the same suspect parts.'}
];
function dots(){var v=steps.filter(function(s){return s.type!=='done'&&s.type!=='reg'});return v.map(function(s,i){var idx=steps.indexOf(s);var c='dot';if(idx<step)c+=' done';else if(idx===step)c+=' active';return'<div class="'+c+'"></div>'}).join('')}
function nextStep(){if(step<steps.length-1){step++;render();window.scrollTo(0,0)}}
function updateProg(){var t=steps.filter(function(s){return s.type!=='done'&&s.type!=='reg'}).length;var c=Math.max(0,step-1);document.getElementById('pbar').style.width=Math.round(c/t*100)+'%';document.getElementById('plbl').textContent=c+'/'+t}
function answerQ(qi,ch){if(answers[qi]!==undefined)return;answers[qi]=ch;if(ch===qs[qi].ans)correct++;render()}
function card(t,l,h,b){var cls='card'+(t==='warn'?' warn':t==='danger'?' danger':t==='ok'?' ok':'');var bd='';if(typeof b==='string')bd='<p>'+b+'</p>';else bd='<ul>'+b.map(function(i){return'<li>'+i+'</li>'}).join('')+'</ul>';return'<div class="'+cls+'"><div class="card-lbl">'+l+'</div><h3>'+h+'</h3>'+bd+'</div>'}
function genHash(s){var h=5381;for(var i=0;i<s.length;i++)h=((h<<5)+h)+s.charCodeAt(i);return'XAI-SR11-'+('00000'+Math.abs(h).toString(16).toUpperCase()).slice(-5)}
function submitCompletion(hash,pct,ds){window.open(FORM_URL+'?usp=pp_url&'+FIELD_NAME+'='+encodeURIComponent(userName)+'&'+FIELD_DATE+'='+encodeURIComponent(ds)+'&'+FIELD_COURSE+'='+encodeURIComponent(COURSE_NAME)+'&'+FIELD_SCORE+'='+encodeURIComponent(pct+'%')+'&'+FIELD_HASH+'='+encodeURIComponent(hash),'_blank')}
function renderReg(){var ds=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});return'<div class="sec-num">REGISTRATION</div><div class="sec-title">Supply Chain / Anti-Counterfeit Training</div><div class="sec-desc">SR-11(1) | DAU CLL032 / DCSA STEPP Aligned | Estimated Duration: 45 Minutes | 80% passing score required</div><div class="reg-box"><label>Full Name</label><input type="text" id="regName" placeholder="e.g. Jane Doe" value="'+userName+'" autocomplete="name"/><label>Date</label><input type="text" value="'+ds+'" readonly/><button class="btn btn-p" style="width:100%" onclick="startTraining()">Begin Training --></button></div>'}
function startTraining(){var n=document.getElementById('regName').value.trim();if(!n){document.getElementById('regName').style.borderColor='var(--red)';return}userName=n;nextStep()}
function renderContent(id){var h='';
if(id==='overview'){h+='<div class="sec-num">01 -- OVERVIEW</div><div class="sec-title">Counterfeit Electronic Parts &amp; Supply Chain Threats</div><div class="sec-desc">A counterfeit part is an unlawful reproduction, substitution, or alteration of a genuine part that misrepresents its identity, authenticity, origin, or performance.</div>';
h+=card('','Who This Training Is For','Mandatory Personnel',['Procurement Specialists -- source and purchase components, verify authenticity','Maintenance Personnel -- install and replace components, recognize suspect indicators','Component Verification Staff -- inspect, test, and authenticate components','Quality Assurance Personnel -- develop anti-counterfeit procedures, manage GIDEP reports']);
h+=card('danger','Categories of Counterfeits','Types You Must Recognize',['<strong>Fraudulent Remarking:</strong> Lower-grade parts remarked as higher-grade. May pass visual but fail under stress.','<strong>Recycled / Salvaged:</strong> Used parts from e-waste resold as new. Exceeded operational lifespan.','<strong>Cloned / Copied:</strong> Unauthorized copies lacking OEM quality controls.','<strong>Out-of-Spec:</strong> Parts not meeting specs but relabeled as conforming.','<strong>Overproduction:</strong> Excess production sold without manufacturer knowledge.','<strong>Defective / Altered:</strong> Defective parts with failures masked through cosmetic treatment.']);
h+=card('warn','The Threat Landscape','Scale of the Problem',['$75B+ annual global counterfeit electronics market (IHS Markit)','15% of spare parts in some sectors estimated to be counterfeit','~70% of suspect counterfeit reports originate from Asia-Pacific gray market channels','1,000+ counterfeit part incidents reported to GIDEP annually','2012 Senate finding: 1,800+ cases involving 1M+ suspect counterfeit parts in U.S. military aircraft']);
}else if(id==='threat'){h+='<div class="sec-num">02 -- WHY COUNTERFEITS ARE DANGEROUS</div><div class="sec-title">Impact &amp; Entry Points</div><div class="sec-desc">Counterfeit parts in defense systems do not just cause equipment failures -- they can cost lives, compromise national security, and expose organizations to criminal liability.</div>';
h+=card('danger','Impact','Why This Matters',['<strong>Mission Failure &amp; Safety:</strong> Counterfeit semiconductors found in missile systems, aircraft avionics, and communication systems','<strong>National Security:</strong> Malicious counterfeits may contain hardware trojans for degrading performance or enabling exploitation','<strong>Premature Failure:</strong> Recycled parts fail under operational conditions -- heat, vibration, EMI','<strong>Legal Liability:</strong> Violates False Claims Act, NDAA Section 818, and DFARS. Penalties include debarment and criminal prosecution.']);
h+=card('warn','Entry Points','How Counterfeits Enter the Supply Chain',['<strong>Independent Distributors / Brokers:</strong> Non-franchised, no OEM relationship -- highest risk channel','<strong>Internet / E-Commerce:</strong> Online marketplaces with no traceability (eBay, Alibaba, AliExpress)','<strong>Offshore Surplus Markets:</strong> E-waste processing regions where military electronics are harvested and resold','<strong>Tier 2/3 Sub-Contractors:</strong> Lower-tier suppliers may introduce counterfeits when authorized parts unavailable']);
h+=card('','Authorized Source Tiers','Risk Increases with Each Tier',['<strong>Tier 1 - OEM (Lowest Risk):</strong> Direct from manufacturer. Full traceability and warranty.','<strong>Tier 2 - Authorized Distributor (Low Risk):</strong> OEM-authorized with chain of custody.','<strong>Tier 3 - Independent Distributor (Medium Risk):</strong> Requires documented risk mitigation, inspection, and testing.','<strong>PROHIBITED - Unauthorized Sources:</strong> Internet marketplaces, unqualified brokers. Not allowed for covered parts.']);
}else if(id==='legal'){h+='<div class="sec-num">03 -- LEGAL FRAMEWORK &amp; PROGRAM REQUIREMENTS</div><div class="sec-title">NDAA, DFARS &amp; SR-11(1) Requirements</div><div class="sec-desc">Multiple federal regulations establish anti-counterfeit requirements with criminal penalties for non-compliance.</div>';
h+=card('','NDAA Section 818','Federal Law',['Requires DoD to establish detection and avoidance systems for counterfeit electronic parts','Mandates use of trusted suppliers and OEMs where practicable','Requires contractors to report counterfeit parts to GIDEP within 60 days','Costs of detection, rework, and field remediation are unallowable if contractor is at fault']);
h+=card('danger','DFARS Requirements','Contractor Obligations',['<strong>252.246-7008:</strong> Purchase from OEMs, authorized dealers, or franchised distributors. Non-franchised use requires documented mitigation.','<strong>252.246-7007:</strong> Written counterfeit detection and avoidance system (CDAS) covering training, inspection, authentication, and reporting','Contractor must quarantine and report suspect parts -- not return to service or discard','Records of all suspect counterfeit parts must be retained for 6 years minimum','Flow-down required to all sub-contractors at all tiers']);
h+=card('ok','CDAP Program Elements','Required Anti-Counterfeit Program',['<strong>Training:</strong> All procurement, receipt, inspection, and maintenance personnel -- annual requirement','<strong>Approved Supplier List:</strong> Documented, enforced. New suppliers require qualification review.','<strong>Procurement Controls:</strong> OEM or authorized distributors. Independent use requires documented risk mitigation.','<strong>Inspection &amp; Testing:</strong> Documented procedures based on risk level for all electronic parts','<strong>Quarantine Procedures:</strong> Suspect parts immediately quarantined, labeled, segregated from serviceable stock','<strong>Reporting &amp; GIDEP:</strong> Report all suspect counterfeits to GIDEP within 60 days']);
}else if(id==='inspect'){h+='<div class="sec-num">04 -- INSPECTION, TESTING &amp; TRACEABILITY</div><div class="sec-title">Identifying Counterfeits &amp; Maintaining Chain of Custody</div><div class="sec-desc">Visual inspection is the first line of defense. Every person who handles electronic components must recognize suspect indicators. When in doubt -- quarantine and report.</div>';
h+=card('warn','Visual Indicators','Packaging &amp; Documentation',['Misspellings, incorrect logos, or low-quality printing on labels','Missing or broken manufacturer seals or anti-tamper tape','Impossible or inconsistent date/lot codes (future dates, mismatched within lot)','Missing or inconsistent part numbers, manufacturer markings, country of origin','Certificates of conformance with spelling errors or missing required fields']);
h+=card('danger','Physical Indicators','Component-Level Red Flags',['Sanding, grinding, or polishing marks on component body indicating remarking','New markings over residue of old markings visible under UV light or magnification','Pin/lead condition inconsistent with "new" status -- oxidation, bent leads, solder residue','Body dimensions inconsistent with datasheet specifications','Thermal interface material residue indicating prior installation']);
h+=card('','Advanced Testing','Beyond Visual Inspection',['<strong>X-Ray:</strong> Reveals internal die structure and bond wire configuration -- detects cloned/remarked parts','<strong>SEM:</strong> High-magnification surface analysis reveals grinding, chemical treatment, remarking evidence','<strong>Decapsulation:</strong> Destructive test exposing die for comparison against known-authentic references','<strong>XRF Material Analysis:</strong> Identifies material composition, detects wrong alloys or RoHS violations']);
h+=card('ok','Traceability Requirements','Documentation for Every Lot',['<strong>Certificate of Conformance (CoC):</strong> Signed document confirming parts meet specifications','<strong>Certificate of Authenticity (CoA):</strong> Confirms parts are genuine OEM manufacture','<strong>Test Reports:</strong> All testing methods, results, equipment used, inspector identification','<strong>Purchase/Shipping Records:</strong> Full chain establishing custody from OEM to point of receipt','<strong>Retention:</strong> Minimum 6 years per DFARS. Safety-critical: life of system + 6 years. Suspect counterfeit: indefinite.']);
}else if(id==='report'){h+='<div class="sec-num">05 -- REPORTING &amp; SUPPLIER MANAGEMENT</div><div class="sec-title">GIDEP Reporting &amp; Supplier Risk Management</div><div class="sec-desc">Reporting is MANDATORY. Failure to report may expose your organization to liability for downstream incidents. Your report protects the entire defense industrial base.</div>';
h+=card('danger','Internal Reporting','Same-Day Actions',['Immediately quarantine the suspect part -- physically segregate and label SUSPECT COUNTERFEIT -- DO NOT USE','Notify Quality Assurance and your supervisor on the same day of discovery','Preserve ALL packaging, documentation, and associated materials -- do not discard anything','Do NOT return suspect parts to the supplier -- this destroys evidence','Do NOT scrap or destroy without QA and legal authorization']);
h+=card('warn','GIDEP Reporting','Within 60 Days',['<strong>1.</strong> Register at gidep.org -- free account for government contractors','<strong>2.</strong> Submit GIDEP Alert with all known part information and indicators','<strong>3.</strong> Attach photos, test results, supplier information, and purchase documentation','<strong>4.</strong> Notify Government Contracting Officer in writing concurrent with GIDEP submission','<strong>5.</strong> Coordinate disposition with QA, legal, and the GCO']);
h+=card('ok','Key Takeaways','Remember These',['<strong>Buy Authorized:</strong> OEMs and franchised distributors only. Every step from OEM increases risk.','<strong>Inspect Every Lot:</strong> One suspect sign = quarantine immediately. Never install a part in doubt.','<strong>Full Traceability:</strong> Document every part from OEM to installation. Retain records 6+ years.','<strong>Quarantine &amp; Report:</strong> Same-day quarantine. GIDEP within 60 days. Never return or scrap without authorization.','<strong>Know the Law:</strong> NDAA and DFARS make counterfeits a federal matter. Debarment and criminal prosecution are real.']);}
h+='<div class="nav"><div class="dots">'+dots()+'</div><button class="btn btn-p" onclick="nextStep()">'+(id==='report'?'Start Quiz -->':'Continue -->')+'</button></div>';return h}
function renderQuiz(qi){var q=qs[qi];var a=answers[qi]!==undefined;var h='<div class="sec-num">KNOWLEDGE CHECK</div><div class="sec-title">Quiz</div><div class="quiz-box"><div class="q-counter">QUESTION '+(qi+1)+' / '+qs.length+'</div><div class="q-text">'+q.q+'</div><div class="options">';var L=['A','B','C','D'];q.opts.forEach(function(o,i){var c='opt';if(a){c+=' off';if(i===q.ans)c+=' correct';else if(i===answers[qi])c+=' wrong'}h+='<button class="'+c+'" onclick="answerQ('+qi+','+i+')"><span class="opt-letter">'+L[i]+'</span><span>'+o+'</span></button>'});h+='</div>';var ok=a&&answers[qi]===q.ans;h+='<div class="feedback'+(a?' show':'')+(a&&!ok?' bad':'')+'">'+(a?(ok?'+ ':'x ')+q.fb:'')+'</div></div>';var last=qi===qs.length-1;h+='<div class="nav"><div class="dots">'+dots()+'</div><button class="btn btn-p" '+(a?'':'disabled')+' onclick="nextStep()">'+(last?'Finish -->':'Next -->')+'</button></div>';return h}
function renderDone(){var pct=Math.round(correct/qs.length*100);var p=pct>=80;var ds=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});var h='<div class="done-wrap">';if(p){var hash=genHash(userName+ds+pct+correct);h+='<div class="done-icon">&#x1f6e1;</div><h2>Congratulations, '+userName+'!</h2><p>You have successfully completed Supply Chain / Anti-Counterfeit Training (SR-11) aligned to DAU CLL032 and DFARS requirements.</p>'}else{h+='<div class="done-icon">&#x1f4cb;</div><h2>Review Recommended</h2><p>'+userName+', you scored below the 80% passing threshold. Review the content and retake when ready.</p>'}h+='<div class="score '+(p?'pass':'fail')+'">'+pct+'%</div><p style="font-family:var(--mono);font-size:11px;color:var(--dim)">'+correct+' / '+qs.length+' CORRECT</p>';if(p){h+='<div class="cert"><div class="cert-lbl">SR-11 Training Completion Record</div>';h+='<div class="cert-row">Name: <span>'+userName+'</span></div>';h+='<div class="cert-row">Course: <span>Supply Chain / Anti-Counterfeit Training (SR-11)</span></div>';h+='<div class="cert-row">Framework: <span>DAU CLL032 / DFARS / NDAA / NIST SP 800-161</span></div>';h+='<div class="cert-row">Score: <span>'+pct+'% ('+correct+'/'+qs.length+')</span></div>';h+='<div class="cert-row">Date: <span>'+ds+'</span></div>';h+='<div class="cert-row">Completion ID: <span style="color:var(--accent);letter-spacing:.08em">'+hash+'</span></div>';h+='<div class="cert-row">Topics: <span>Counterfeit Types, NDAA/DFARS, Authorized Sources, Visual/Electrical Indicators, Inspection, Traceability, GIDEP Reporting</span></div></div>';h+='<br/><button class="btn btn-p" onclick="submitCompletion(\''+hash+'\','+pct+',\''+ds+'\')">Submit Completion Record</button>&nbsp;&nbsp;'}h+='<br/><br/><button class="btn '+(p?'btn-g':'btn-p')+'" onclick="restart()">Retake</button></div>';return h}
function render(){var s=steps[step];var h='';if(s.type==='reg')h=renderReg();else if(s.type==='c')h=renderContent(s.id);else if(s.type==='q')h=renderQuiz(s.id);else h=renderDone();document.getElementById('root').innerHTML=h;updateProg()}
function restart(){step=0;answers={};correct=0;render();window.scrollTo(0,0)}
render();
</script>
