t);text-align:left;width:100%;transition:border-color .15s}.opt:hover{border-color:var(--accent);color:#fff}.opt.correct{border-color:var(--green);background:rgba(0,255,159,.05);color:var(--green)}.opt.wrong{border-color:var(--red);background:rgba(255,71,87,.05);color:var(--red)}.opt.off{cursor:default;pointer-events:none}.opt-letter{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--accent);min-width:16px;padding-top:1px}.opt.correct .opt-letter{color:var(--green)}.opt.wrong .opt-letter{color:var(--red)}.feedback{margin-top:16px;padding:13px 14px;border-left:3px solid var(--green);font-size:13px;color:var(--text);line-height:1.6;display:none}.feedback.show{display:block}.feedback.bad{border-color:var(--red)}.feedback strong{color:#fff}.nav{display:flex;align-items:center;justify-content:space-between;margin-top:28px}.dots{display:flex;gap:5px;flex-wrap:wrap}.dot{width:6px;height:6px;border-radius:50%;background:var(--border)}.dot.active{background:var(--accent);box-shadow:0 0 5px var(--accent)}.dot.done{background:var(--green)}.btn{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:10px 20px;border:1px solid;cursor:pointer;background:transparent;transition:all .15s}.btn-p{border-color:var(--accent);color:var(--accent)}.btn-p:hover{background:var(--accent);color:var(--bg)}.btn-p:disabled{opacity:.3;cursor:default;pointer-events:none}.btn-g{border-color:var(--border);color:var(--dim)}.btn-g:hover{border-color:var(--dim);color:var(--text)}.done-wrap{text-align:center;padding:48px 0}.done-icon{font-size:44px;margin-bottom:16px}.done-wrap h2{font-size:24px;font-weight:700;color:#fff;margin-bottom:8px}.done-wrap p{font-size:13px;color:var(--dim);max-width:460px;margin:0 auto 24px;line-height:1.6}.score{font-family:var(--mono);font-size:44px;font-weight:600;text-shadow:0 0 24px rgba(0,255,159,.4);margin:16px 0 4px}.score.pass{color:var(--green)}.score.fail{color:var(--red)}.cert{border:1px solid var {type:'q',id:0},{type:'q',id:1},{type:'q',id:2},{type:'q',id:3},{type:'q',id:4},{type:'q',id:5},{type:'q',id:6},{type:'q',id:7},{type:'q',id:8},{type:'q',id:9},{type:'q',id:10},{type:'q',id:11},{type:'done'}];
var qs=[
{q:'Which of the following BEST defines a counterfeit electronic part under DFARS 252.246-7008?',opts:['Any part purchased from a non-U.S. supplier that has not been tested','An unlawful reproduction, substitution, or alteration of a genuine part that misrepresents its identity, origin, performance, or conformance','Any part that fails incoming inspection regardless of source','A part that is out of date code by more than 24 months'],ans:1,fb:'<strong>Correct.</strong> DFARS 252.246-7008 defines a counterfeit electronic part as an unlawful or unauthorized reproduction, substitution, or alteration that misrepresents the part\'s identity, origin, material, performance, or conformance.'},
{q:'The OEM is backordered. A broker on an online marketplace offers the parts at a steep discount. What is the correct action?',opts:['Purchase from the online broker since the OEM cannot supply the parts','Purchase from the broker and perform visual inspection upon receipt','Do not purchase from the unauthorized source; document the backorder and pursue authorized alternatives or request program office guidance','Purchase from the broker and test 10% of the lot'],ans:2,fb:'<strong>Correct.</strong> Online marketplaces and unauthorized brokers are prohibited sources. An OEM backorder does not authorize use of unauthorized sources.'},
{q:'Under NDAA Section 818 and DFARS, within how many days of discovering a suspect counterfeit part must a contractor submit a GIDEP report?',opts:['24 hours','30 days','60 days','90 days'],ans:2,fb:'<strong>Correct.</strong> DFARS 252.246-7008 requires contractors to report suspect counterfeit parts to GIDEP within 60 days of discovery.'},
{q:'A maintenance technician notices grinding marks and lot codes applied over residue on replacement capacitors. What should she do?',opts:['Install the parts -- cosmetic variations are common','Test electrically first; if they pass, visual indicators can be disregarded','Immediately quarantine the entire lot, label SUSPECT COUNTERFEIT, and notify Quality Assurance','Return the parts to the supplier and request replacements'],ans:2,fb:'<strong>Correct.</strong> Grinding marks and remarking residue are classic counterfeit indicators. A single visual indicator is sufficient cause to quarantine. Do NOT install, return to supplier, or rely on electrical testing alone.'},
{q:'Which type of counterfeit involves genuine components recovered from electronic waste and resold as new?',opts:['Cloned / copied parts','Out-of-spec parts','Recycled / salvaged parts','Overproduced parts'],ans:2,fb:'<strong>Correct.</strong> Recycled/salvaged parts are recovered from discarded electronic equipment and resold as new. They may appear functional initially but have depleted operational life.'},
{q:'Your organization needs to buy from an independent (non-franchised) distributor. Which risk mitigation is REQUIRED by DFARS?',opts:['No additional measures are required','Documented risk mitigation including incoming inspection and testing, plus documentation explaining why authorized sources were not used','Purchasing in small quantities reduces risk sufficiently','A verbal confirmation from the distributor that parts are genuine'],ans:1,fb:'<strong>Correct.</strong> DFARS allows non-franchised distributors only with documented risk mitigation including inspection/testing and documentation of why authorized sources were unavailable.'},
{q:'What does "traceability" mean in the context of anti-counterfeit requirements?',opts:['The ability to track physical location in the warehouse','The ability to trace a component from its current location back to the original manufacturer through an unbroken, documented chain of custody','The ability to determine remaining useful life based on manufacture date','A software feature that flags parts from overseas suppliers'],ans:1,fb:'<strong>Correct.</strong> Traceability means an unbroken documented chain of custody from the OEM to the current location. A part that cannot be traced cannot be used in covered applications.'},
{q:'X-ray inspection reveals die size and bond wire configuration inconsistent with known-authentic reference images. What does this indicate?',opts:['Parts were likely damaged during shipping','X-ray results are unreliable for counterfeit detection','The parts are suspect counterfeit -- the internal die is inconsistent with the genuine part design','The parts should be retested with a different X-ray machine'],ans:2,fb:'<strong>Correct.</strong> X-ray inspection is specifically used to detect cloned and remarked parts. Die inconsistency with known-authentic references is a strong counterfeit indicator requiring immediate quarantine.'},
{q:'How long must inspection, testing, and procurement documentation be retained under DFARS 252.246-7007?',opts:['1 year from installation','3 years from procurement','Minimum 6 years; life-of-system plus 6 years for safety-critical applications','Until the program ends'],ans:2,fb:'<strong>Correct.</strong> DFARS requires minimum 6-year retention. Safety-critical parts: life of system plus 6 years. Quarantine records: retain indefinitely.'},
{q:'What is the CORRECT disposition for confirmed suspect counterfeit parts?',opts:['Return to supplier and request credit','Scrap immediately to prevent use','Quarantine, label, report to QA and GIDEP, notify Contracting Officer, and determine disposition in coordination with QA and legal','Test remaining parts; release those that pass'],ans:2,fb:'<strong>Correct.</strong> Never return suspect parts to supplier (destroys evidence, re-enters supply chain) or scrap without authorization. Quarantine, report, and coordinate disposition.'},
{q:'How do you MOST reliably verify a new supplier\'s claim of being an authorized franchised distributor?',opts:['Accept the supplier\'s own authorization letter','Search the manufacturer\'s official website or contact the manufacturer directly to verify','Purchase a sample lot and test it','Check the supplier\'s LinkedIn profile and website'],ans:1,fb:'<strong>Correct.</strong> Contact the OEM directly or check their official authorized distributor list. Supplier-provided letters can be forged. Sample testing only proves the sample, not ongoing authorization.'},
{q:'What is GIDEP and why is contractor participation important?',opts:['A government insurance program for counterfeit losses','The Government-Industry Data Exchange Program -- a database where organizations share failure and suspect counterfeit part reports, enabling the broader defense community to avoid compromised components','An export control registration system','A voluntary quality certification program'],ans:1,fb:'<strong>Correct.</strong> GIDEP is a cooperative database where agencies and contractors share suspect counterfeit alerts, enabling every participating organization to identify and reject the same suspect parts.'}
];

function startTraining(){var n=document.getElementById('regName').value.trim();if(!n){document.getElementById('regName').style.borderColor='var(--red)';return}userName=n;nextStep()}
function renderContent(id){var h='';
if(id==='what'){h+='<div class="sec-num">01 -- COUNTERFEIT THREATS</div><div class="sec-title">What Are Counterfeit Electronic Parts?</div><div class="sec-desc">A counterfeit part is an unlawful or unauthorized reproduction, substitution, or alteration of a genuine part that misrepresents its identity, authenticity, or performance.</div>';
h+=card('','Categories','Types of Counterfeit Parts',['<strong>Fraudulent Remarking:</strong> Lower-grade parts remarked as higher-grade. May pass visual inspection but fail under stress.','<strong>Recycled / Salvaged:</strong> Used parts from e-waste resold as new. May have exceeded operational lifespan.','<strong>Cloned / Copied:</strong> Unauthorized copies manufactured without authorization. May appear identical but lack quality controls.','<strong>Out-of-Spec:</strong> Parts that don\'t meet specifications but are relabeled as conforming.','<strong>Overproduction:</strong> Excess production sold without manufacturer knowledge through unauthorized channels.','<strong>Defective / Altered:</strong> Genuinely defective parts with failures masked through cleaning or refinishing.']);
h+=card('warn','Threat Landscape','Scale of the Problem',['$75B+ annual global counterfeit electronics market (IHS Markit)','~70% of suspect counterfeit reports originate from Asia-Pacific gray market channels','1,000+ counterfeit part incidents reported to GIDEP annually affecting defense systems','Primary entry points: independent distributors/brokers, e-commerce platforms, offshore surplus markets, lower-tier subcontractors']);
}else if(id==='danger'){h+='<div class="sec-num">02 -- WHY COUNTERFEITS ARE DANGEROUS</div><div class="sec-title">Mission, Safety &amp; National Security Impact</div><div class="sec-desc">Counterfeit parts in defense systems do not just cause equipment failures -- they can cost lives, compromise national security, and expose organizations to criminal liability.</div>';
h+=card('danger','Mission Failure','Safety Risk',['Counterfeit semiconductors found in missile systems, aircraft avionics, communication systems, and night-vision equipment','A single failed counterfeit component can cause mission failure or catastrophic safety events','In 2012, the U.S. Senate found over 1,800 cases involving 1 million+ suspect counterfeit parts in U.S. military aircraft']);
h+=card('warn','National Security','Hardware Trojans',['Malicious counterfeits may contain hardware trojans -- hidden circuitry designed to degrade performance, leak data, or enable remote exploitation','This is an active nation-state threat vector targeting defense supply chains','Recycled parts may appear functional initially but fail prematurely under operational conditions']);
h+=card('','Legal Liability','Federal Consequences',['Supplying counterfeit parts violates the False Claims Act, NDAA Section 818, and DFARS','Penalties include contract debarment, civil damages, and federal criminal prosecution','Costs of detection, rework, and field remediation are unallowable if contractor is at fault']);
}else if(id==='law'){h+='<div class="sec-num">03 -- LEGAL FRAMEWORK &amp; SR-11 REQUIREMENTS</div><div class="sec-title">NDAA, DFARS &amp; NIST SR-11(1)</div><div class="sec-desc">Multiple federal laws and regulations govern counterfeit prevention. Compliance is mandatory for all covered contractors.</div>';
h+=card('','NDAA Section 818','Federal Mandate',['Requires DoD to establish detection and avoidance systems for counterfeit electronic parts','Mandates use of trusted suppliers and OEMs where practicable','Requires contractors to report counterfeit parts to GIDEP within 60 days','Establishes contractor liability for costs of detection, rework, and field remediation']);
h+=card('warn','DFARS Requirements','Contractor Obligations',['<strong>252.246-7008:</strong> Must purchase from OEMs, authorized dealers, or franchised distributors','Non-franchised distributor use requires documented risk mitigation including inspection/testing','Requires a Counterfeit Detection and Avoidance Program (CDAP)','Flow-down required to all sub-contractors at all tiers','<strong>252.246-7007:</strong> Written counterfeit detection system, quarantine and report suspect parts, retain records 6+ years']);
h+=card('ok','SR-11(1) Required Program Elements','CDAP Components',['<strong>Training:</strong> All procurement, inspection, and maintenance personnel must complete anti-counterfeit training annually','<strong>Approved Supplier List:</strong> Documented list of qualified suppliers. All purchases flow through ASL-approved sources.','<strong>Procurement Controls:</strong> OEMs and authorized distributors. Independent distributors require additional testing.','<strong>Inspection & Testing:</strong> Documented procedures based on risk level','<strong>Quarantine:</strong> Suspect parts quarantined, labeled, segregated. Not returned to service, scrapped, or returned to suppliers.','<strong>Reporting:</strong> Report to GIDEP within 60 days. Internal reporting immediately upon identification.']);
}else if(id==='indicators'){h+='<div class="sec-num">04 -- COUNTERFEIT INDICATORS</div><div class="sec-title">Visual, Electrical &amp; Advanced Detection</div><div class="sec-desc">Visual inspection is the FIRST line of defense. When in doubt -- quarantine and report. Any single indicator is sufficient cause to quarantine.</div>';
h+=card('','Packaging Indicators','Check the Documentation',['Misspellings, incorrect logos, or low-quality printing on labels','Missing or broken manufacturer seals or anti-tamper tape','Date codes that are inconsistent or impossible (e.g., future dates)','Certificates of conformance with spelling errors or incorrect formats','Multiple parts in a lot with mismatched date/lot codes']);
h+=card('danger','Physical Indicators','Check the Component',['Sanding, grinding, or polishing marks on component body indicating remarking','New markings over residue of old markings visible under UV light or magnification','Pin/lead condition inconsistent with "new" status -- oxidation, bent leads, solder residue','Body dimensions inconsistent with datasheet specifications','Thermal interface material residue indicating prior installation']);
h+=card('warn','Electrical & Advanced','Beyond Visual',['Parameters outside specification limits on parametric testing','Functional failures at temperature extremes despite nominal room-temperature performance','<strong>X-Ray Inspection:</strong> Non-destructive imaging reveals internal die structure -- detects cloned/remarked parts','<strong>SEM:</strong> High-magnification surface analysis reveals grinding marks invisible to naked eye','<strong>Decapsulation:</strong> Destructive test exposing die for comparison against known-authentic references','<strong>XRF Material Analysis:</strong> Identifies wrong alloys, restricted materials, or counterfeit solder']);
}else if(id==='gidep'){h+='<div class="sec-num">05 -- REPORTING, TRACEABILITY &amp; SUPPLIER MGMT</div><div class="sec-title">GIDEP, Documentation &amp; Supplier Qualification</div><div class="sec-desc">Reporting is MANDATORY. Failure to report may expose your organization to liability for downstream incidents.</div>';
h+=card('danger','Immediate Actions','When You Find a Suspect Part',['Immediately quarantine -- physically segregate and label SUSPECT COUNTERFEIT -- DO NOT USE','Notify Quality Assurance and your supervisor on the same day','Preserve all packaging, documentation, and associated materials','Do NOT return suspect parts to the supplier -- this destroys evidence','Do NOT scrap or destroy without QA and legal authorization']);
h+=card('warn','GIDEP Reporting','Within 60 Days',['Register at gidep.org -- free account for government contractors','Submit GIDEP Alert with all known part information and indicators','Include photos, test results, supplier information, and purchase documentation','Notify your Government Contracting Officer in writing','GIDEP alerts protect other organizations from installing the same counterfeit parts']);
h+=card('ok','Traceability Requirements','Document Everything',['<strong>Certificate of Conformance (CoC):</strong> Signed document confirming parts meet specifications','<strong>Certificate of Authenticity (CoA):</strong> Confirms parts are genuine OEM manufacture','<strong>Test Reports:</strong> All testing and inspection results with methods, equipment, and inspector ID','<strong>Purchase Records:</strong> Full chain of POs, packing lists, and shipping documentation','Retain all records minimum 6 years. Safety-critical: life of system + 6 years.','Quarantine records retained indefinitely until disposition is closed']);
h+=card('','Supplier Qualification','Before First Purchase',['Verify business registration, licenses, and legal standing','Confirm authorized distributor status with OEM directly -- do not rely on supplier claims','Review supplier quality management system (ISO 9001, AS9120)','Conduct initial sample inspection before approving for production','<strong>Disqualification triggers:</strong> Confirmed counterfeit, false certificates, loss of OEM authorization, debarment (check SAM.gov)']);
}
h+='<div class="nav"><div class="dots">'+dots()+'</div><button class="btn btn-p" onclick="nextStep()">'+(id==='gidep'?'Start Quiz -->':'Continue -->')+'</button></div>';return h}
function renderQuiz(qi){var q=qs[qi];var a=answers[qi]!==undefined;var h='<div class="sec-num">KNOWLEDGE CHECK</div><div class="sec-title">Quiz</div><div class="quiz-box"><div class="q-counter">QUESTION '+(qi+1)+' / '+qs.length+'</div><div class="q-text">'+q.q+'</div><div class="options">';var L=['A','B','C','D'];q.opts.forEach(function(o,i){var c='opt';if(a){c+=' off';if(i===q.ans)c+=' correct';else if(i===answers[qi])c+=' wrong'}h+='<button class="'+c+'" onclick="answerQ('+qi+','+i+')"><span class="opt-letter">'+L[i]+'</span><span>'+o+'</span></button>'});h+='</div>';var ok=a&&answers[qi]===q.ans;h+='<div class="feedback'+(a?' show':'')+(a&&!ok?' bad':'')+'">'+(a?(ok?'+ ':'x ')+q.fb:'')+'</div></div>';h+='<div class="nav"><div class="dots">'+dots()+'</div><button class="btn btn-p" '+(a?'':'disabled')+' onclick="nextStep()">'+(qi===qs.length-1?'Finish -->':'Next -->')+'</button></div>';return h}
function genHash(s){var h=5381;for(var i=0;i<s.length;i++)h=((h<<5)+h)+s.charCodeAt(i);return 'XAI-SR1-'+('000000'+Math.abs(h).toString(16).toUpperCase()).slice(-6)}
function submitCompletion(hash,pct,ds){window.open(FORM_URL+'?usp=pp_url&'+FIELD_NAME+'='+encodeURIComponent(userName)+'&'+FIELD_DATE+'='+encodeURIComponent(ds)+'&'+FIELD_COURSE+'='+encodeURIComponent(COURSE_NAME)+'&'+FIELD_SCORE+'='+encodeURIComponent(pct+'%')+'&'+FIELD_HASH+'='+encodeURIComponent(hash),'_blank')}
function renderDone(){var pct=Math.round(correct/qs.length*100);var passed=pct>=80;var now=new Date();var ds=now.toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});var h='<div class="done-wrap">';if(passed){h+='<div class="done-icon">&#x1f6e1;</div><h2>Congratulations, '+userName+'!</h2><p>You have successfully completed Supply Chain / Anti-Counterfeit Training (SR-11) aligned to DAU CLL032 and DFARS requirements.</p>'}else{h+='<div class="done-icon">&#x1f4cb;</div><h2>Review Recommended</h2><p>'+userName+', you scored below 80%. Review the content and retake when ready.</p>'}h+='<div class="score '+(passed?'pass':'fail')+'">'+pct+'%</div><p style="font-family:var(--mono);font-size:11px;color:var(--dim)">'+correct+' / '+qs.length+' CORRECT</p>';if(passed){var hash=genHash(userName+ds+pct+correct);h+='<div class="cert"><div class="cert-lbl">SR-11(1) Training Completion Record</div><div class="cert-row">Name: <span>'+userName+'</span></div><div class="cert-row">Course: <span>Supply Chain / Anti-Counterfeit (SR-11 / DAU CLL032)</span></div><div class="cert-row">Framework: <span>NDAA Section 818 / DFARS / NIST 800-161</span></div><div class="cert-row">Score: <span>'+pct+'% ('+correct+'/'+qs.length+')</span></div><div class="cert-row">Date: <span>'+ds+'</span></div><div class="cert-row">Completion ID: <span style="color:var(--accent);letter-spacing:.08em">'+hash+'</span></div><div class="cert-row">Topics: <span>Counterfeit Types, Legal Framework, Authorized Sources, Visual/Electrical Indicators, GIDEP, Traceability, Supplier Mgmt</span></div></div><br/><button class="btn btn-p" onclick="submitCompletion(\''+hash+'\','+pct+',\''+ds+'\')">Submit Completion Record</button>&nbsp;&nbsp;'}h+='<br/><br/><button class="btn '+(passed?'btn-g':'btn-p')+'" onclick="restart()">Retake</button></div>';return h}
function render(){var s=steps[step];var h='';if(s.type==='reg')h=renderReg();else if(s.type==='c')h=renderContent(s.id);else if(s.type==='q')h=renderQuiz(s.id);else h=renderDone();document.getElementById('root').innerHTML=h;updateProg()}
function restart(){step=0;answers={};correct=0;render();window.scrollTo(0,0)}
render();
</script></body></html>
