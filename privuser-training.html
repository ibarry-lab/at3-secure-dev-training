er);background:var(--surface);padding:20px 24px;display:inline-block;text-align:left;margin-top:20px;max-width:440px;width:100%}.cert-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:var(--accent);margin-bottom:12px;text-transform:uppercase}.cert-row{font-family:var(--mono);font-size:11px;color:var(--dim);margin-bottom:4px}.cert-row span{color:var(--text)}.reg-box{background:var(--surface);border:1px solid var(--border);padding:32px 28px;max-width:420px;margin:0 auto}.reg-box label{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--dim);text-transform:uppercase;margin-bottom:6px}.reg-box input{width:100%;background:var(--surface2);border:1px solid var(--border);color:#fff;font-family:var(--sans);font-size:14px;padding:10px 12px;margin-bottom:20px;outline:none;transition:border-color .15s}.reg-box input:focus{border-color:var(--accent)}.reg-box input[readonly]{color:var(--dim);cursor:default}

var FORM_URL='https://docs.google.com/forms/d/e/1FAIpQLSdHsEWs-iPTGncIBdIiFGaEnxl6MXMN6IHFnUVDGyG1Trf4fw/viewform';

var step=0,answers={},correct=0,userName='';
var steps=[{type:'reg'},{type:'c',id:'overview'},{type:'c',id:'leastpriv'},{type:'c',id:'mfa'},{type:'c',id:'audit'},{type:'c',id:'change'},
{type:'q',id:0},{type:'q',id:1},{type:'q',id:2},{type:'q',id:3},{type:'q',id:4},{type:'q',id:5},{type:'q',id:6},{type:'q',id:7},{type:'q',id:8},{type:'q',id:9},{type:'q',id:10},{type:'q',id:11},{type:'q',id:12},{type:'q',id:13},{type:'done'}];
var qs=[
{q:'What is the primary purpose of the Principle of Least Privilege?',opts:['To ensure all users have identical access rights across all systems','To restrict access rights for users to the minimum permissions needed to perform their job functions','To allow privileged users to access any system in an emergency without prior authorization','To reduce the total number of user accounts maintained by an organization'],ans:1,fb:'<strong>Correct.</strong> Least privilege limits each user to only the minimum access required for their role, reducing attack surface and limiting damage from compromised accounts.'},
{q:'A system administrator receives an urgent call asking her to use her admin account to quickly check a personal email. What should she do?',opts:['Use the admin account briefly since the task will only take a minute','Refuse, as admin accounts must never be used for personal or non-administrative tasks','Use the admin account only if she logs out immediately after','Ask a colleague to send the email from their account instead'],ans:1,fb:'<strong>Correct.</strong> Admin accounts must be used exclusively for administrative tasks. Using a privileged account for personal tasks exposes the system to malware, phishing, and credential theft.'},
{q:'Which Multi-Factor Authentication method is considered the MOST phishing-resistant for privileged access?',opts:['One-time password (OTP) sent via SMS to a registered mobile phone','Email-based verification link with a time-limited code','FIDO2/WebAuthn hardware security key or CAC/PIV smart card with PIN','Security question answered correctly after password entry'],ans:2,fb:'<strong>Correct.</strong> FIDO2/WebAuthn and CAC/PIV use cryptographic challenges bound to specific origins, making them immune to phishing. SMS OTPs are vulnerable to SIM-swapping.'},
{q:'A database administrator discovers he has access to a production financial database not required for his current role. What is the correct action?',opts:['Keep the access in case it becomes useful for future projects','Test the access to confirm it works, then report it to the security team','Report the excessive access to the ISSO/ISSM for immediate review and revocation','Only use the access when his regular database access is unavailable'],ans:2,fb:'<strong>Correct.</strong> Excess or unneeded access must be reported and revoked. Retaining unnecessary access violates least privilege principles and creates security liability.'},
{q:'Which events are REQUIRED to be captured in privileged user audit logs per NIST SP 800-53 AU-2?',opts:['The screen brightness level the administrator set during the session','The number of browser tabs opened during the admin session','All privilege escalation events, account changes, and configuration modifications','The administrator\'s physical location during access'],ans:2,fb:'<strong>Correct.</strong> NIST AU-2 requires logging of privilege escalation, account changes, login/logout events, and configuration changes for the audit trail needed to detect and investigate incidents.'},
{q:'Under what circumstances may a network engineer make a configuration change to a production firewall WITHOUT an approved change request?',opts:['When the change is minor and will take less than 5 minutes','During after-hours maintenance periods when users are not affected','When the engineer believes the change is low-risk and reversible','No circumstances -- all production changes require an approved change request'],ans:3,fb:'<strong>Correct.</strong> All production changes require an approved Change Request without exception. Emergency changes must still be documented with a post-implementation CR within 24 hours.'},
{q:'What is the maximum session lock timeout for privileged administrator workstations?',opts:['60 minutes of inactivity','30 minutes of inactivity','15 minutes of inactivity','Session lock is optional for admin workstations in secure areas'],ans:2,fb:'<strong>Correct.</strong> Privileged workstations must auto-lock after 15 minutes of inactivity. Leaving admin sessions unattended exposes critical systems to unauthorized access.'},
{q:'A system administrator notices that entries from a critical audit log have been deleted. What should she do FIRST?',opts:['Restore the log entries from backup and continue normal operations','Investigate the deletion herself before involving others','Report the suspected log tampering to the ISSO/ISSM immediately as a security incident','Document the deletion in a personal notebook and report at the next team meeting'],ans:2,fb:'<strong>Correct.</strong> Log tampering is a serious security incident requiring immediate reporting to the ISSO/ISSM. The administrator should NOT investigate alone as this could contaminate forensic evidence.'},
{q:'What does Separation of Duties require when granting a new privileged account?',opts:['The same administrator who requests access should also approve it to speed up provisioning','The person requesting access and the person approving access must be different individuals','Two administrators must both approve and then also implement the access change together','Separation of duties only applies to financial systems, not IT administration'],ans:1,fb:'<strong>Correct.</strong> Separation of duties requires that the requestor and approver for privileged access be different people, preventing any single individual from granting themselves unauthorized access.'},
{q:'A PAM system auto-rotates passwords after each privileged session. Why is this important?',opts:['It forces administrators to memorize new passwords regularly','It prevents reuse of compromised credentials -- an attacker who captures a session password cannot use it again','It satisfies MFA requirements by adding a second authentication factor','It ensures privileged accounts are deleted after each use'],ans:1,fb:'<strong>Correct.</strong> Password auto-rotation after each use means even if a credential is stolen during a session, it cannot be replayed. This is a key control against credential theft and lateral movement.'},
{q:'Which of the following is an example of Just-in-Time (JIT) privileged access?',opts:['Granting a system administrator permanent admin rights to all servers from day one','An administrator\'s elevated access automatically expires two hours after an approved maintenance task begins','Storing admin passwords in a shared spreadsheet accessible to the whole IT team','Using the same admin account for both routine tasks and emergency response'],ans:1,fb:'<strong>Correct.</strong> JIT access grants elevation only for the duration of an approved task, then automatically revokes it, reducing the window of exposure from compromised credentials.'},
{q:'A database administrator accidentally accesses a table containing classified personnel records she was not authorized to view. What should she do?',opts:['Close the window immediately and say nothing, since it was an accident','Copy the data to a secure location to show she was not misusing it','Report the unauthorized access to the ISSO/ISSM within 24 hours as a security incident','Send an email to the data owner apologizing and consider the matter closed'],ans:2,fb:'<strong>Correct.</strong> Accidental unauthorized access to sensitive data must be reported within 24 hours. Failure to report -- even an accident -- is itself a policy violation.'},
{q:'Which regulatory framework specifically mandates Zero Trust Architecture principles for privileged access?',opts:['NIST SP 800-53 Revision 4','DoD 8570.01 IA Workforce Framework','Executive Order 14028 on Improving the Nation\'s Cybersecurity','CDSE DS-IA112.06 Privileged User Training Standard'],ans:2,fb:'<strong>Correct.</strong> Executive Order 14028 (2021) mandated federal adoption of Zero Trust Architecture, requiring continuous verification, least-privilege access, and assuming breach.'},
{q:'An audit log shows a network engineer executed firewall rule changes at 2:00 AM on a Saturday without a corresponding approved change request. This is BEST described as:',opts:['Acceptable, because network engineers have discretion for off-hours changes','An unauthorized change -- a potential policy violation and security incident requiring investigation','A minor procedural oversight correctable by submitting the CR retroactively','Normal behavior, as emergency changes are always performed outside business hours'],ans:1,fb:'<strong>Correct.</strong> Unauthorized changes to production -- especially outside business hours without a CR -- are serious policy violations and potential security incidents requiring investigation.'}
];
function dots(){var v=steps.filter(function(s){return s.type!=='done'&&s.type!=='reg'});return v.map(function(s,i){var idx=steps.indexOf(s);var c='dot';if(idx<step)c+=' done';else if(idx===step)c+=' active';return'<div class="'+c+'"></div>'}).join('')}
function nextStep(){if(step<steps.length-1){step++;render();window.scrollTo(0,0)}}
function updateProg(){var t=steps.filter(function(s){return s.type!=='done'&&s.type!=='reg'}).length;var c=Math.max(0,step-1);document.getElementById('pbar').style.width=Math.round(c/t*100)+'%';document.getElementById('plbl').textContent=c+'/'+t}
function answerQ(qi,ch){if(answers[qi]!==undefined)return;answers[qi]=ch;if(ch===qs[qi].ans)correct++;render()}
function card(t,l,h,b){var cls='card'+(t==='warn'?' warn':t==='danger'?' danger':t==='ok'?' ok':'');var bd='';if(typeof b==='string')bd='<p>'+b+'</p>';else bd='<ul>'+b.map(function(i){return'<li>'+i+'</li>'}).join('')+'</ul>';return'<div class="'+cls+'"><div class="card-lbl">'+l+'</div><h3>'+h+'</h3>'+bd+'</div>'}
function genHash(s){var h=5381;for(var i=0;i<s.length;i++)h=((h<<5)+h)+s.charCodeAt(i);return'XAI-PU3-'+('000000'+Math.abs(h).toString(16).toUpperCase()).slice(-6)}
function submitCompletion(hash,pct,ds){window.open(FORM_URL+'?usp=pp_url&'+FIELD_NAME+'='+encodeURIComponent(userName)+'&'+FIELD_DATE+'='+encodeURIComponent(ds)+'&'+FIELD_COURSE+'='+encodeURIComponent(COURSE_NAME)+'&'+FIELD_SCORE+'='+encodeURIComponent(pct+'%')+'&'+FIELD_HASH+'='+encodeURIComponent(hash),'_blank')}
function renderReg(){var ds=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});return'<div class="sec-num">REGISTRATION</div><div class="sec-title">Privileged User Cybersecurity Responsibilities</div><div class="sec-desc">AT-3 / CDSE DS-IA112.06 | Estimated Duration: 30 Minutes | 80% passing score required</div><div class="reg-box"><label>Full Name</label><input type="text" id="regName" placeholder="e.g. Jane Doe" value="'+userName+'" autocomplete="name"/><label>Date</label><input type="text" value="'+ds+'" readonly/><button class="btn btn-p" style="width:100%" onclick="startTraining()">Begin Training --></button></div>'}
function startTraining(){var n=document.getElementById('regName').value.trim();if(!n){document.getElementById('regName').style.borderColor='var(--red)';return}userName=n;nextStep()}
function renderContent(id){var h='';
if(id==='overview'){h+='<div class="sec-num">01 -- OVERVIEW</div><div class="sec-title">Who Are Privileged Users?</div><div class="sec-desc">Privileged users have elevated access rights beyond standard accounts -- granting them the ability to configure systems, manage data, and control network resources. You are a high-value target.</div>';
h+=card('','Privileged Roles','Who This Applies To',['<strong>System Administrators:</strong> Install, configure, and maintain OS and server environments. Manage user accounts and policies.','<strong>Database Administrators:</strong> Control access to databases. Manage schemas, backups, and sensitive data stores.','<strong>Network Engineers:</strong> Configure routers, firewalls, switches, and VPNs. Control data flow across the enterprise.']);
h+=card('danger','Why You Are Targeted','Privileged Accounts = #1 Target',['74% of data breaches involve privileged credential abuse','Privileged users are 3x more likely to be targeted than standard users','Average cost of a privileged access breach: $4.9M','Common vectors: credential theft via phishing, privilege escalation, insider threats, pass-the-hash attacks, lateral movement']);
}else if(id==='leastpriv'){h+='<div class="sec-num">02 -- LEAST PRIVILEGE &amp; ADMIN PRACTICES</div><div class="sec-title">Principle of Least Privilege &amp; Account Management</div><div class="sec-desc">Every user, program, and process must operate with the MINIMUM set of privileges necessary to perform authorized tasks -- and no more.</div>';
h+=card('','Core Requirements','Least Privilege in Practice',['Maintain separate standard and privileged accounts -- never browse the web or read email using an admin account','Restrict privileged access to specific systems, functions, and time windows only','Revoke access immediately when no longer required (role change, termination, project end)','Implement just-in-time (JIT) access -- elevate only when needed, then de-escalate','Document all privileged access grants in your access control records']);
h+=card('ok','Do\'s','Best Practices',['Use a dedicated admin account for privileged tasks only','Log off or lock admin sessions when not in use','Apply role-based access control (RBAC) aligned to job function','Review and recertify access rights quarterly','Use privilege escalation tools (sudo, PAM) with full logging']);
h+=card('danger','Don\'ts','Prohibited Practices',['Share admin credentials with colleagues','Use admin accounts for everyday computing tasks','Leave privileged sessions open and unattended','Grant broad admin rights "just in case"','Bypass access review processes or audit trails']);
h+=card('warn','Admin Account Rules','Mandatory Requirements',['<strong>Named Accounts Only:</strong> All privileged access must use individually named accounts. Shared/generic admin accounts are prohibited.','<strong>Strong Passwords:</strong> Minimum 15-character passphrase, rotate every 60 days, never reuse previous 24','<strong>Time-Based Windows:</strong> After-hours privileged access must be pre-approved and logged','<strong>No Persistent Sessions:</strong> Screen lock at 15 min max, auto-logout policies enforced','<strong>Separation of Duties:</strong> Requestor and approver must be different individuals. Dual control for critical operations.']);
}else if(id==='mfa'){h+='<div class="sec-num">03 -- MULTI-FACTOR AUTHENTICATION</div><div class="sec-title">MFA Requirements for Privileged Access</div><div class="sec-desc">MFA is MANDATORY for all privileged accounts. A single password is never sufficient to protect high-value access. MFA reduces account compromise risk by over 99%.</div>';
h+=card('','Three Factors','Authentication Categories',['<strong>Something You KNOW:</strong> Password, PIN, Security Questions','<strong>Something You HAVE:</strong> Smart card, CAC, Hardware token, Authenticator app','<strong>Something You ARE:</strong> Fingerprint, Retina scan, Face ID, Voice recognition']);
h+=card('danger','Implementation Requirements','Where MFA Is Mandatory',['<strong>All Remote Access:</strong> VPN, RDP, SSH, and remote admin tools must enforce MFA at all times','<strong>Privileged Account Login:</strong> Every admin login -- local or remote -- requires MFA. No bypass without ISSO approval.','<strong>Service Accounts:</strong> Must use certificate-based auth or vault-managed secrets, not static passwords','<strong>Recovery Procedures:</strong> MFA bypass/recovery must be documented, require manager approval, and generate audit logs','<strong>Token Management:</strong> Lost/stolen hardware tokens must be reported within 1 hour. Certificates revoked immediately.','<strong>Phishing-Resistant MFA:</strong> Use FIDO2/WebAuthn or PIV-based MFA rather than SMS OTPs where possible']);
}else if(id==='audit'){h+='<div class="sec-num">04 -- AUDIT LOGGING &amp; MONITORING</div><div class="sec-title">Logging Requirements &amp; PAM</div><div class="sec-desc">All privileged user actions must be logged, protected from tampering, and reviewed regularly. Assume every action is being recorded.</div>';
h+=card('','What Must Be Logged','NIST SP 800-53 AU-2 Requirements',['User login and logout events (success and failure)','Privilege escalation events -- use of sudo, runas, or admin elevation','Account creation, modification, and deletion','Changes to security settings, group policies, or ACLs','File and directory access events for sensitive/classified data','Remote access sessions -- VPN, RDP, SSH with source IP and duration','System configuration changes -- firewall rules, service starts/stops','Database queries against sensitive tables (DBAs)']);
h+=card('warn','Log Management','Retention &amp; Review',['Retain logs for minimum 1 year (3 years for some DoD systems)','Logs must be stored in a write-once, tamper-evident system','Off-system log storage prevents privileged users from deleting their own traces','Automated SIEM alerts for suspicious privileged activity','Human review of flagged events within 24 hours']);
h+=card('ok','PAM Tools','Privileged Access Management',['<strong>Credential Vaulting:</strong> All privileged passwords stored in encrypted vault, auto-rotate after each use','<strong>Session Recording:</strong> Full keystroke and screen recording of privileged sessions, tamper-proof','<strong>Just-in-Time Access:</strong> Granted only for approved task duration, automatically revoked','<strong>Workflow Integration:</strong> Access requests linked to change tickets with automatic approval workflows']);
}else if(id==='change'){h+='<div class="sec-num">05 -- CHANGE CONTROL &amp; INCIDENT REPORTING</div><div class="sec-title">Change Management &amp; Security Incident Reporting</div><div class="sec-desc">No privileged changes to production systems may be made without an approved change request. Unauthorized changes are a policy violation and may constitute a security incident.</div>';
h+=card('','Change Control Process','6-Step Workflow',['<strong>1. Request:</strong> Submit Change Request (CR) with justification','<strong>2. Review:</strong> Technical and security review by CAB/ISSO','<strong>3. Approve:</strong> Authorization by Change Advisory Board','<strong>4. Implement:</strong> Execute during approved window with logging active','<strong>5. Verify:</strong> Test and validate change outcome','<strong>6. Close:</strong> Document results, update configuration baseline']);
h+=card('danger','Incident Reporting','Report Immediately (Within 1 Hour)',['Unauthorized access to privileged accounts','Unexpected system behavior after configuration change','Evidence of log tampering or deletion','Detection of malware or unauthorized software','Loss or theft of admin credentials or tokens']);
h+=card('warn','Report Within 24 Hours','Additional Reportable Events',['Suspicious account activity or login anomalies','Unplanned system outages caused by admin actions','Accidental unauthorized data access','Policy deviations that have already occurred','Any situation you are uncertain about -- when in doubt, report']);
h+=card('ok','Key Takeaways','Remember These',['<strong>Least Privilege:</strong> Minimum access required. Separate admin from daily-use accounts.','<strong>MFA Everywhere:</strong> All privileged access requires MFA. Use phishing-resistant methods.','<strong>Log Everything:</strong> All actions are logged, retained, and reviewed.','<strong>Change Control:</strong> No unauthorized changes. Every change needs an approved CR.','<strong>Report Incidents:</strong> See something, say something. Report within 1 hour for active incidents.']);}
h+='<div class="nav"><div class="dots">'+dots()+'</div><button class="btn btn-p" onclick="nextStep()">'+(id==='change'?'Start Quiz -->':'Continue -->')+'</button></div>';return h}
function renderQuiz(qi){var q=qs[qi];var a=answers[qi]!==undefined;var h='<div class="sec-num">KNOWLEDGE CHECK</div><div class="sec-title">Quiz</div><div class="quiz-box"><div class="q-counter">QUESTION '+(qi+1)+' / '+qs.length+'</div><div class="q-text">'+q.q+'</div><div class="options">';var L=['A','B','C','D'];q.opts.forEach(function(o,i){var c='opt';if(a){c+=' off';if(i===q.ans)c+=' correct';else if(i===answers[qi])c+=' wrong'}h+='<button class="'+c+'" onclick="answerQ('+qi+','+i+')"><span class="opt-letter">'+L[i]+'</span><span>'+o+'</span></button>'});h+='</div>';var ok=a&&answers[qi]===q.ans;h+='<div class="feedback'+(a?' show':'')+(a&&!ok?' bad':'')+'">'+(a?(ok?'+ ':'x ')+q.fb:'')+'</div></div>';var last=qi===qs.length-1;h+='<div class="nav"><div class="dots">'+dots()+'</div><button class="btn btn-p" '+(a?'':'disabled')+' onclick="nextStep()">'+(last?'Finish -->':'Next -->')+'</button></div>';return h}
function renderDone(){var pct=Math.round(correct/qs.length*100);var p=pct>=80;var ds=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});var h='<div class="done-wrap">';if(p){var hash=genHash(userName+ds+pct+correct);h+='<div class="done-icon">&#x1f6e1;</div><h2>Congratulations, '+userName+'!</h2><p>You have successfully completed Privileged User Cybersecurity Responsibilities Training (AT-3/CDSE DS-IA112.06).</p>'}else{h+='<div class="done-icon">&#x1f4cb;</div><h2>Review Recommended</h2><p>'+userName+', you scored below the 80% passing threshold. Review the content and retake when ready.</p>'}h+='<div class="score '+(p?'pass':'fail')+'">'+pct+'%</div><p style="font-family:var(--mono);font-size:11px;color:var(--dim)">'+correct+' / '+qs.length+' CORRECT</p>';if(p){h+='<div class="cert"><div class="cert-lbl">AT-3 Training Completion Record</div>';h+='<div class="cert-row">Name: <span>'+userName+'</span></div>';h+='<div class="cert-row">Course: <span>Privileged User Cybersecurity Responsibilities</span></div>';h+='<div class="cert-row">Framework: <span>CDSE DS-IA112.06 / NIST 800-53r5 / IL5 / FedRAMP High</span></div>';h+='<div class="cert-row">Score: <span>'+pct+'% ('+correct+'/'+qs.length+')</span></div>';h+='<div class="cert-row">Date: <span>'+ds+'</span></div>';h+='<div class="cert-row">Completion ID: <span style="color:var(--accent);letter-spacing:.08em">'+hash+'</span></div>';h+='<div class="cert-row">Topics: <span>Least Privilege, Admin Accounts, MFA, Audit Logging, PAM, Change Control, Incident Reporting</span></div></div>';h+='<br/><button class="btn btn-p" onclick="submitCompletion(\''+hash+'\','+pct+',\''+ds+'\')">Submit Completion Record</button>&nbsp;&nbsp;'}h+='<br/><br/><button class="btn '+(p?'btn-g':'btn-p')+'" onclick="restart()">Retake</button></div>';return h}
function render(){var s=steps[step];var h='';if(s.type==='reg')h=renderReg();else if(s.type==='c')h=renderContent(s.id);else if(s.type==='q')h=renderQuiz(s.id);else h=renderDone();document.getElementById('root').innerHTML=h;updateProg()}
function restart(){step=0;answers={};correct=0;render();window.scrollTo(0,0)}
render();
</script>
